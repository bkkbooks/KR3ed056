body:
  text: 卷四兒科門赤子初生百脈未周賴母乳哺之而其膚革未充精髓未滿恆易招客忤究其根原有未離母胎而已受病者有既脫母腹而旋致病者有變蒸非病而調護失宜輾轉而成病者加以痘疹關煞種種皆病之所叢生心誠求之不中不遠今自初生以及孩提少長內外主客各採數方雖未盡保嬰之法而按症投之可無橫夭是亦慈幼之一端也輯兒科小兒初生集要十則一小兒初生先濃煎黃連甘草湯用軟絹或絲綿包指蘸藥摳出口中惡血氣或不及即以藥湯灌之待吐出惡沫然後與乳能令出痘稀少一小兒生下不出聲者急看上齶有泡即用銀簪挑破絲棉拭去血勿令入喉可活一方切不可斷臍以棉衣包兒用火紙捻燒臍待兒氣轉回方可斷臍一兒生未乳之前用淡豆豉濃煎與服可下胎毒最妙乳後亦可服且能助養脾氣消化乳食月內以豬乳哺兒可解痘毒驚癇且無撮口臍風之患一初生小兒不尿乃胎熱也取大蔥白切四片取乳汁半盞同煎片時分作四服即通不飲乳者服之飲乳若臍旁有青黑色及撮口者不治一初生小兒大小便不通以致腹脹欲死急令人以開水漱口吸咂兒前後心並手足心臍下七處凡五七次以皮紅赤色為度須臾即通一小兒生下遍身無皮用白米粉干撲之候皮生乃止一小兒周歲之內謂之芽兒切忌頻浴以致濕熱之氣鬱聚不散身生赤遊丹毒如胭脂塗染腫而壯熱毒一入腹則肚脹哽氣以致殺兒更有洗後包裹失護風邪所傷身生白流腫而壯熱增寒鼻塞腦悶痰喘咳逆故兒切忌多浴一凡浴兒時須四圍遮好謹避風寒又須掩好肚臍勿令潮濕否則風邪入臍流毒心脾能致撮口臍風等症倘臍中有濕將大紅羊絨燒灰糝上扎好或用馬齒莧燒灰敷之治口瘡並效一小兒忽然驚搐當令平臥於床席之上任其牽動不可抱緊蓋風與痰相激而逆行筋絡間皆有痰流注定後則仍歸於脾胃中若一緊抱便凝結不散醒後多成廢人戒之戒之馬蘭膏一治小兒兩足紅赤遊風流火如足至小腹手至胸膛多致不救急用此方救之百不失一並治大人兩腿赤腫流火或濕熱伏於經絡皮上不紅不腫其痛異常病者只叫腿熱他人按之極冷此謂伏氣之病急用此膏搽之立愈馬蘭頭不拘多少冬季無葉取根亦可上用水洗去泥搗爛絞汁以雞毛蘸汁搽之干則再換如頸項腿肋縫中潰爛以此汁調飛淨六一散搽之即愈六一散方二滑石五錢硃砂六分甘草一錢研末和勻金黃散三治小兒胎毒赤遊丹毒用生黃蜜調敷川黃連藍石寒水石黃柏芙蓉葉各五錢景天鬱金各一錢五分大黃一兩各取淨末研細和勻外敷內服皆可內服每服五分甘草節四分煎湯和蜜調下一方治胎毒濕爛用薔薇花梗連皮去葉炙研細末茶油調敷一方治小兒月內㾩瘡滿頭及渾身脫皮者用多年尿缸內紅色磚焙乾為末或香油或麻油俱可調搽一方治小兒丹毒用馬齒莧或藍澱搗敷之治撮口方四穿山甲用尾上甲三片羊油炙黃色蠍梢七個共為細末人乳調塗乳上令兒吮之用厚衣包裹汗出即愈預治小兒臍風馬牙經驗方五枯礬硼砂各二錢五分冰片麝香各五釐硃砂二分共為末凡小兒生下洗浴過用此藥糝臍上每日換尿布時仍糝此末糝完一料永無臍風等症紫蘆散六治小兒竹衣胎㾩凡無皮膿血淋漓及胎中遺毒赤剝楊梅等瘡並治婦女為丈夫梅瘡所過結毒之氣漸至陰戶濕爛流血不止沿至産門外繞肛門腫硬潰膿出水不休疼痛不堪將此藥搽之每一小便勢必衝去須要勤搽漸漸自愈極驗如神若毒勢重者配入珍珠一錢五分西黃一錢其效更捷大冰頭五分紫甘蔗皮燒存性取淨末粉口兒茶各五錢真緑豆粉要炒燥厚川黃柏各七錢以豬膽汁塗炙七次輕白蘆甘石火煅一兩黃連汁內淬三次童便內淬四次赤石脂五錢煅上共為細末用麻油入雞子黃煎黑去黃候冷調搽即愈假如麻油二兩入雞子黃一枚內服解毒丸方開後解毒丸七西牛黃三分乳香燈草炒沒藥燈草炒各五分山慈菰一錢硃砂雄黃各七分麝香一分取當門子佳上共研勻煉蜜為丸每丸約重三分每日以金銀花煎湯調服一丸如欲稀痘候瘡好後每逢節氣日調服一二丸出痘必稀凡治胎㾩須過周歲之外方可搽此藥周歲之內神氣未足適遇變病反歸咎也胎癩八先用豬膽煎湯浴淨再用宮粉水調塗於碗內曬乾用艾熏至老黃色取下為末絹袋撲之絶妙胎毒害眼九凡新産小兒兩目紅赤澀閉腫爛不開以蛐蟺泥搗塗囟門干則再換不過三次即愈或以生南星生大黃等分為末用醋調塗兩足心亦愈鉤藤飲十治小兒臟寒夜啼陰極發燥鉤藤鉤茯神茯苓當歸川芎各一錢木香煨四分甘草五分姜一片棗二枚水煎服若心經有熱臉紅便赤去木香加硃砂一分木通五分赤芍一錢當歸散十一治夜啼不乳黨參五分當歸四分白芍三分炙甘草桔梗陳皮各二分白水煎服燈花散十二治小兒夜啼燈草不拘多少燒灰存性用燈草湯調下或塗兒上齶止汗散十三治小兒睡而自汗舊蒲扇燒灰存性為末每服三錢溫酒調下嬰兒胎疝方十四凡小兒初生髮疝只見啼哭不見病形延至一周兩歲始知是疝諸醫不效用麻櫪樹上之鴛鴦果一對其果連樹枝取下可辨真假一對果可治三人荔枝核七枚杵碎平地木即多年老樹椿根也三錢同煎飲即瘥亦不再發一方於午日午時以腳盆盛熱水安於中堂隨抱小兒將卵放水內一浸再將小兒在於中門檻上中間一擱其卵上之水印痕於檻將艾圓在檻上濕印處炙三壯其卵遂漸收小如故惺惺散十五治小兒傷寒時氣風熱頭痛目眵多睡痰壅咳嗽喘急或痘疹已出未出疑似之間黨參茯苓白朮炒甘草北細辛川芎桔梗炒各等分為末每服二錢入薄荷葉五分水煎服異功散十六止渴消暑生津補胃豬苓澤瀉各三錢黨參白朮茯苓各五錢陳皮二錢半硃砂一錢上為末蜜丸芡實大每服一丸燈心竹葉湯化下七味安神丸十七治心經蘊熱驚悸黃連當歸身麥冬去心炒白茯苓甘草各五錢硃砂飛一兩冰片二分半上為末白湯浸蒸餅和獖豬心血搗丸黍米大每服十丸燈心湯下急慢驚風十八須真正驚風始用有神效用硃砂輕粉等分水飛研細在秋分後寒露前取青蒿根內蟲不拘條數以足和藥為度看其急走緩走分別記之搗汁和上二味為丸如粟米大急走者治急驚風緩走者治慢驚風每歲用二丸人乳化服便痰即愈千金散十九治小兒一切驚症制膽星甘草各一錢天麻川黃連硃砂冰片各二錢全蠍殭蠶各錢半真西黃三分各取淨末和勻研至無聲為度每服一分金銀湯下急救回春散二十治小兒慢驚慢脾風症遠志白殭蠶製附子天麻乾薑硃砂各八分白芥子制膽星黑甘草各一錢冰片一分西黃五釐各取末和勻研極細每服二分用金銀器並黨參白朮各一錢真橘紅五分煎湯下三服取效凡小兒急驚面紅氣促痰壅手足抽搐無涕淚而哭聲高大此雖中氣不通而症發於陽千金散方見前十九惺惺散方見前十五安神丸方見前十七可治如氣促面白肢冷時或屢搐目珠磁瞪此慢驚也寒痰風毒入於胞絡急用回春散治之又有症名慢脾風者或因寒邪風毒入於肝經致傷脾土或因攻散之過肝風內眩脾胃因虛而寒其見症也終日閉目似睡非睡鼻微搧氣微急手足時冷時熱鼻尖冷虎口紋青黑色數日不大便或解糞水小便清或混白色速照方制服間進六君即內症二二號香砂六君湯去藿香砂仁理中方見內症六十九等湯保嬰丹二十一稀痘纏豆藤或黃豆或緑豆梗上纏繞細紅藤是也於八月生氣日擇取陰乾聽用二兩防風荊芥穗紫草茸去根酒浸牛蒡子炒各一兩升麻鹽水炒甘草去皮各五錢天竺黃真者三錢真蟾酥真牛黃各一錢好硃砂用麻黃紫草荔枝殼升麻各等分同煮過復以此汁飛過三錢赤小豆黑豆緑豆各三十粒略炒勿焦上另用紫草二兩入水二碗煎膏至小半碗入砂糖一大匙將前各藥為細末同紫草膏丸如李核大即以硃砂為衣於未痘之先濃煎甘草湯每磨服一丸大者二丸若已發熱用生薑湯磨服蓋被睡而表之多者可少少者可無大有神效稀痘仙方二十二是方神驗異常有一人家上下小兒數十出痘奇險惟服此藥者皆得安吉青蒿子八十一粒硃砂三分淨甘草三錢緑豆粉真者一錢上將青蒿子甘草二味文火烘乾研水飛細同硃砂豆粉和勻於七月七日清晨摘帶露鳳仙花紅白各七朵荷花一朵荷葉一張莖一根絞汁和入藥內陰乾再研極細至二分二至用緑豆赤豆黑豆各一錢薄荷五分鉤藤七枚紅花二分牛膝一錢煎湯調下一錢如不肯服或加冰糖一錢或豬腰子雞軟肝黏末食之服之數次痘出自稀痘發時亦可服二三次可免伏陷倒塌之患肝火盛加緑豆心火盛加赤豆腎有毒加黑豆上部不起發加薄荷有驚加鉤藤下部不起發加牛膝不紅活加紅花是方藥無難制依分兩可數十料一合後按症加者照原分兩倍之胡荽酒二十三闢穢氣使痘疹出快用胡荽四兩以好酒二盞煎一二沸令乳母口含噴兒遍身或噴頭面房中須燒胡荽香以闢除穢氣能使痘疹出快煎過胡荽懸房門上更妙或用棗炙之兒聞棗香尤能開胃氣進飲食解毒氣若起脹之後則宜避酒氣忌發散慎不可用養血化斑湯二十四治白疹白痘當歸身黨參炙生地各一錢紅花四分蟬蛻五分加生薑一片白水煎溫服四味消毒飲二十五治痘瘡熱甚毒氣壅遏黨參炙甘草黃連牛蒡子各等分上為粗末每服一錢加姜一片水煎去渣不拘時溫服十二味異功散二十六治元氣虛寒小兒痘疹色白寒戰咬牙泄瀉喘嗽等症黨參丁香木香肉豆蔻陳皮厚朴各二錢半白朮茯苓官桂各二錢當歸三錢半製附子製半夏各錢半上每服二錢姜一片棗二枚水煎服保嬰濟痘神丹二十七白豆俗名雀豆顏色淨白似苡米乃佳赤豆緑豆各三兩俱連殼甘草煎汁浸一宿曬研蟬蛻去頭足淨水飛銀花元參生地各二兩荊芥穗生耆各三兩人中黃一兩五錢歸身一兩各取末用胡荽一兩酒浸一宿煎汁跌丸如黍米大辰砂五錢為衣每服一錢初見點時燈心湯下貫膿漿糯米一撮煎湯下初見不起發饅籠膏三釐湯下痘顆倒陷帶火干收蒸法二十八柴胡真降香檀香各一兩蔥二十莖全歸二兩蒸籠膏五錢煎湯加淡黃酒二兩傾浴桶內將兒置浴桶上隔被單蒸日三次蒸後目微活漸有啼聲痘粒增長可望起色加內服瀉毒飲瀉毒飲二十九治痘粒干收大生地元參全歸各一兩淨銀花八錢生甘草五錢法制半夏三錢加金汁半酒杯辰砂一分沖服二劑照前蒸方兩日六次痘瘡復起貫漿不足或多破裂此火有餘而氣虛也接服托裡益氣湯托裡益氣湯三十治痘漿不足淨銀花元參各二錢人中黃五錢鮮蘆根八錢上黃耆飯鍋蒸熟三錢柴胡升麻各四分照服二劑再接服後二方生地益陰煎三十一元參銀花赤芍白茯苓各二錢歸身甘菊各一錢五分丹皮八分生地五錢生甘草一錢上方與後方相間服之可投十餘劑以杜痘後諸患參朮和脾飲三十二西黨參三錢於朮酒拌土微炒銀花各一錢五分橘皮一錢嫩桑芽七粒無芽用葉上方與前方間服救逆痘良法三十三痘至七八朝或十朝或十七八朝灰陷倒塌抓破無血空殼無漿目開不食破損處如焦木灰紅危篤垂死醫皆袖手者老白雄雞冠血不拘多少多更妙白酒釀十匙胡荽汁二十匙三味攪和隔湯頓熱徐徐服之停一時皮膚紅活即有另發大痘目復閉面復腫其內陷之毒皆復發出漸思飲食初與米飲次與黃耆粥飲不必更服他藥也服一次若未全起五更時再服一次必活倘面紅氣喘此痘毒由里達表不必驚懼誤認變症痘瘡黑陷三十四凡心煩氣喘妄語見鬼以不落水豬心血和冰片不拘分兩以足和為度丸如芡實大每服一丸用紫草五錢浸酒一杯去紫草用酒化丸服少頃下瘀血神清瘡即紅活透出此醫所不能治者百發百中神應非凡痘爛生蛆三十五用嫩柳葉鋪席上墊臥蛆盡出而愈五福化毒丹三十六治胎毒及痘後頭面生瘡眼目腫痛生地黃天門冬麥門冬元參熟地黃各三兩甘草甜硝各二兩青黛一兩五錢上為末煉蜜丸芡實大每服一丸白湯或薄荷湯下痘疔散三十七雄黃一錢紫草三錢上為細末胭脂汁調用銀簪腳挑破黑痘入藥在內極效痘疹入目三十八用黑狗耳刺血滴眼中其瘡自落痘後目翳三十九天花粉蛇蛻洗焙等分為末用羊肝披開入藥在內米泔煎熟切食旬日即愈痘風眼癬四十諸藥不效者用蛔蟲一條洗淨捶爛以夏布絞取汁加冰片少許調搽隨愈如無蛔蟲取活五穀蟲搗汁亦可痘後耳內腥臭作膿四十一此痘之餘也取銀花甘草濃煎調人中黃服之耳內用麻油蘸沁之痘後癰毒四十二用赤小豆末雞子清塗敷風熱雙和飲四十三治痧疹初起發熱微覺惡寒肌栗面赤咳嗽腹微疼葛根銀花葉丹皮各一錢紫蘇葉柴胡各八分麥芽夏曲建曲各半赤芍二錢赤苓三錢甘草五分引新荷葉一片蘆根汁半酒杯干胡荽四分無新荷葉用桑芽一錢代之初見點投三劑去柴葛加炒荊芥六分大貝一錢五分連翹去心八分元參二錢再二劑蘇葉換蘇粳八分炒荊芥換桔梗一錢二分赤苓減一錢銀花葉換銀花一錢五分赤芍減五分外加小生地二錢杏仁泥一錢二分廣皮六分生穀芽二錢引去新荷胡荽加燈心一分再四劑化蟲散四十四治疳積生蟲五穀蟲一錢瓦焙乾使君肉五個切片焙等分炒研為末用紅棗去皮核煮爛為丸每末一錢用棗二枚每粒重一錢五分清米飲調服一方治小兒疳積用雞內金不落水剝下炙灰研細黃糖拌食兩三次即愈一方用大蟾一隻放瓶內將紙封口過七日再將鮮活五穀蟲洗淨入瓶中任蟾食盡炭火煅研為末蜜丸如桐子大每服三丸鍋焦粉山楂各五分湯下疳膨食積仙方四十五硃砂三分為末朴硝雞內金各五錢共研和每服三分人中白四分煎湯調服治猴猻疳方四十六川黃連甘草各三錢胡桃七個連殼打爛用水煎二次濾清熬成膏每日服四五次每次四五匙至重者二料全愈猴子疳方四十七是症從肛門或陰囊邊紅暈爛起漸至皮膚不結靨若眼梢口旁亦紅不早治必至爛死凡有此症切忌洗浴只用軟絹蘸甘草湯揩淨用藥雖延蔓遍身可救緑豆粉一兩膘珠一錢輕粉一錢五分冰片二分西黃一分研細將金汁調鵝毛蘸敷如無金汁雪水亦可甘草燈草湯亦可內服化毒丹化毒丹四十八元參桔梗赤苓各二錢黃連龍膽草薄荷青黛連翹各一錢甘草五分加燈草二十寸煎服乳母煎藥方四十九小兒患猻疳乳母亦宜服藥川連木通各五分銀花赤芍當歸各錢半甘草牛膝黑山梔各一錢薄荷七分連翹八分桔梗二錢新汲水煎服生熟地黃湯五十治疳眼閉合不開生地黃熟地黃各五錢川芎赤茯苓枳殼杏仁去皮尖川黃連半夏曲天麻地骨皮炙甘草各二錢五分上每服二三錢引用黑豆十五粒姜二分水煎服羊肝散五十一治疳氣入眼並痘後眼脬腫痛羞明密蒙花二錢青葙子決明子車前子各一錢炒上為末用羊肝一大頁薄批糝上濕紙裹煨熟空心食之小兒語遲五十二孫真人云凡小兒四五歲只會叫人不能言語者以赤小豆研末酒調塗於舌下二三次即能說話小兒頭上黃水瘡及禿痂神效方五十三松香二兩為末入蔥管內用線扎定水煮溶化去蔥候乾黃丹水飛一兩宮粉炒無名異炒各一錢輕粉炒三分共為細末香油調搽極效一方治禿瘡每剃頭後以銀匠店中漬銀水熱洗一遍用豬腳爪煅末麻油調敷三四次愈爛瘡成孔五十四凡小兒或頭面遍身形似楊梅瘡者用蒸糯米甑上氣水滴下以盤盛取搽之數日即愈小兒軟癤五十五用大芋頭一個搗如泥敷之疳瘡方五十六若沸滿口中爛穿面孔諸藥不治者尤效用紫荊葉九月採者佳炙灰存性每灰二錢加冰片三釐糝上即生肌肉馬鳴散五十七治走馬疳人中白即尿缸底白垽也以物刮取新瓦盛之火煅如白鹽乃佳五錢五倍子生者一錢另用一錢同礬煅之馬鳴退即蠶蛻紙也火燒過二錢五分枯白礬二錢即用五倍子一錢入礬於內煅枯者上為極細末先以濃米泔水浸洗瘡口以此吹糝之一方用人龍在瓦上焙乾研細加青黛少許冰片少許研勻吹入即愈一方用陳京墨煅煙盡加冰片少許搽上即愈益陰養榮膏五十八治童子癆初起發熱咳嗽陰虛盜汗脾胃不香遺精咯血等症密刺海參大淡菜建蓮肉南棗各八兩文武火熬須晝夜不斷火俟成膏去渣每早用一大匙開水化下服盡一料即愈小兒健脾丸方五十九治小兒脾胃不健飲食不香或嗜食無厭病後或斷乳後失調俱宜常服淮山嶽建蓮肉鍋焦粉白朮黨參茯苓各二兩神麯須穀芽五穀蟲山楂各一兩雞內金廣皮各五錢胡黃連二錢炙甘草三錢各取淨末冰糖熬化為丸如彈子大日二粒附録變蒸考凡兒生後必有變蒸之期其發熱吐瀉與病無異若誤認為疾妄投藥餌以致蒸長之氣全消無疾而成疾誤事不淺今列其期於下按期考之可以知兒之強弱並無誤藥之弊云凡初生至三十二日為一變六十四日為一蒸人有三百六十五骨內除手足中四十五碎骨余止三百二十數自生下一日則生十段十日百段三十二日則三百二十段為一變自生下算起至三十二日一變而生癸腎臟氣屬足少陰經主身熱面耳骫俱冷唇起白泡六十四日則二變一蒸而生壬膀胱腑氣屬足太陽經主寒熱發而頻噴嚏哯乳多嗔上唇微腫九十六日則三變而生丁心臟氣屬手少陽經主體熱汗出恐畏虛驚一百二十八日則四變二蒸而生丙小腸腑氣屬手太陽經主渾身壯熱一百六十日則五變而生乙肝臟氣屬足厥陰經主掌骨成而學匍匐一百九十二日則六變三蒸而生甲膽腑氣屬足少陽經主情昏神倦眼閉不開二百二十四日則七變而生辛肺臟氣屬手太陰經主情思恓惶而愛多哭二百五十六日則八變四蒸而生庚大腸腑氣屬手陽明經主微利腸鳴而膚熱二百八十八日則九變而生己脾臟氣屬足太陰經主身熱吐瀉三百二十日則十變五蒸而生戊胃腑氣屬足陽明經主不食腹痛吐乳微汗心包絡為臟屬手厥陰經三焦為腑屬手少陽經二者俱無形狀故不變而又不蒸至十變五蒸既訖則共三百二十日矣復有三大蒸焉六十四日為一變蒸積至一百九十二日為一大變蒸歷三大變蒸後共五百七十六日變蒸始定寸脈乃生可以診視兒始成人變者變生五臟而易其情態也蒸者蒸養六腑而長其骨節也凡變始得之一日以至七日上唇中心必有白珠泡子形如魚目白睛微赤輕則身熱有汗而微驚耳與尻冷重則壯熱或汗或不汗脈亂不食而嘔噦如身與耳尻皆熱者則又兼犯他症其變兼蒸者必上唇微腫如臥蠶類身體壯熱或乍熱乍涼唇口鼻乾哽氣吐逆而脈亂或汗或不汗不食時驚多啼哯乳自始得之一日至十三日變蒸既足方無所苦其三大蒸者必唇口乾燥咳嗽喘急悶亂哽氣腹疼身體骨節皆疼或目上視時多驚悸然七日之內有病但數呵其囟門勿輕服藥若有不驚不熱無他苦者是受胎壯實而暗變也
