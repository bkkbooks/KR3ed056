body:
  text: 卷二外科門症有內復有外外之形症可一望而知而亦有表裡寒熱虛實之別大抵發於臟者陰也發於腑者陽也而陰中陰陽中陽陰中陽陽中陰變易互易幻不可測或施治之偶誤或援拯之稍緩輕者致重重者致死可不慎諸夫病有淺深發有緩急而淺者多急而易痊深者多緩而難愈總以升提解散為第一要著其積之深而發之緩者為臟為陰升而越之其積之淺而發之急者為腑為陽解以和之次則且補且提且托且散化大為小舉重若輕是菩提之妙果也制方者體此無論癰疽疔毒按形症而求之治之可應手取效幸勿以方多習見少之至若咽喉出入呼吸死生視聽分司聰明互用內外之因不一療救之法斯存又如齒唇口舌相輔而行依絡循經表印乎里審標察本治及其源各具數方固知簡也言提其要庶有當乎輯外症仙方活命飲一治一切癰疽不論陰陽惡毒未成即消已成即潰化膿生肌散瘀消腫乃瘡科之聖藥也穿山甲銀花各二錢皂角刺歸尾各一錢五分赤芍陳皮甘草節天花粉貝母白芷各一錢防風七分乳香沒藥各五分俱去油酒水各半煎服六味湯二治癰疽發背疔瘡並一切無名腫毒未成者消已成者潰最危之症三服全愈生地黃生黃耆生甘草白芷炒當歸炒穿山甲炒各三錢患在頭面加川芎五錢手足加桂枝五錢中部加杜仲五錢下部加牛膝五錢上連引七味依方稱準分量不可增減善飲者用黃酒二碗煎一碗不善飲者酒水各一碗煎服萬靈丹三茅朮八兩全蠍明天麻石斛當歸炙甘草川芎羌活荊芥防風麻黃北細辛川烏湯泡去皮草烏湯泡去皮尖何首烏以上各一兩明雄黃六錢共為細末煉蜜丸丸分三等一兩作四丸一兩作六丸一兩作九丸硃砂六錢為衣收貯瓷瓶凡遇惡瘡癰疽發背等症用連須蔥白九枝煎一茶杯看患者年歲老壯病勢緩急酌用三等之丸未成隨消已成即高腫而潰如無須發散者只用熱酒化服服後避風食稀粥忌冷物房事孕婦勿服醒消丸四治一切癰疽腫毒初起即消乳香沒藥各一兩麝香去油一錢五分雄精五錢共研和黃米飯一兩搗爛入末再搗為丸蘿蔔子大曬乾忌烘每服三錢熱陳酒送下醉蓋取汗酒醒癰消痛止犀黃丸五治乳岩瘰癧痰核橫痃流注肺癰小腸癰等症即醒消丸內除去雄精加犀黃三分如前法為丸每服三錢熱陳酒送下患生上部臨臥服生下部空心服益氣養營煎六治疽患漫腫多日腳散頂平川芎生甘草節各一錢當歸銀花茯苓生黃耆各二錢炙山甲一錢五分荊芥八分用蔥一枝酒半杯早晚每投一劑外治須急聚根腳中敷玉樞丹即太乙紫金丹見前內症四二四圍以坎宮錠敷之見後二一更加用生蔥一兩黃蜜三錢大遠志肉八錢搗爛成餅重湯蒸熱貼於患處金銀花酒七治癰疽發背疔瘡等患不論生在何處初起服之重者減輕輕者消散鮮忍冬花連藤一兩即金銀花大甘草節五錢用白水二碗文武火慢煎至一碗入無灰酒一大碗再煎十數沸去渣分為三服一日夜服盡病勢重者一日二劑服至大小便通利則藥力到如無鮮者即干亦可然終不及鮮者之妙外用葉入砂盆研爛和蔥汁加酒少許稀稠得宜塗於患處四圍中留一口泄氣內服外敷三日取效一味濟陰散八治癰疽發背一切瘡毒紅色高腫屬陽者槐花淨米一升炒焦為末分作二服將一服每日好酒服四五錢一服老酒煎調敷患處四五日即愈一味升陽散九治癰疽發背一切瘡毒白色漫腫屬陰者遠志肉四兩將二兩用陳酒二碗煎至一碗又投好酒半碗臨睡時溫服將渣同下存遠志肉二兩入大酒臘糟少許共搗如泥患處周圍敷上裹好輕者一服全愈重者二服穿爛者五七服全好不用膏藥真神方也消毒神效散十治發背癰疽乳癰一切外患初起即散已成者搽三次收小出毒隨愈鮮山嶽五兩不見水土朱松香白洋糖各一兩全蠍十個上共搗爛圍之留頂藥上蓋紙周時一換一味消毒散十一治癰疽腫毒陳小粉不拘分兩年久者佳炒黃黑色研以陳米醋調熬如黑漆狀瓦罐收用紙攤剪孔貼之冷如冰痛即止少頃覺癢幹不可動毒消藥脫神驗解凝散十二治氣凝血滯癰疽初起堅硬可散遠志真菊葉各三錢荊芥全當歸丹參各五分上藥各取淨末和勻研細蜜酒蔥汁調敷每藥末一錢加入真川貝二分芒硝四釐敷痰凝結核並效腫毒熱癤方十三治一切癰癤紅腫疼痛難忍者陳京墨醋磨汁每墨汁半小杯和入豬膽汁一小匙生薑蘸頻塗患處定痛消腫神驗赤小豆散十四治癰疽初起敷之即消遠志八錢首烏皮一兩赤小豆一兩五錢紅花八分荊芥三錢各取末和勻每藥末一兩加真麝香四分蔥酒汁調敷星辛散十五治一切外症初起色淡浮腫生南星生大黃北細辛上藥等分蔥汁醋滷熬稠調敷錦蓉散十六治一切外症初起紅熱火症錦紋大黃十六兩白芷四兩芙蓉葉三兩元參二兩各取淨末研至無聲為度用蔥汁黃蜜調敷蓉豆散十七治一切外症初起芙蓉葉或根或花鮮者搗爛乾者研末赤小豆研末等分用蜜調塗四圍中間留頂干則頻換已成未成俱效沖和膏十八治外症初起堅腫色淡赤芍二兩白芷防風各一兩獨活三兩龍腦三錢石菖蒲一兩五錢各取淨末以瓷瓶收貯不可泄氣臨用時薑汁滷醋調敷一日一換沖和散十九凡人環跳穴處及兩膝附骨等處感受風寒濕氣面上不熱漫腫無頭皮色不變微覺痠痛攣拘若不即治變生貼骨等癰難以收功急用此藥祛寒逐濕透出外絡提移他處出毒即有成管成漏亦能逐漸收功屢用皆效紫荊皮五兩炒赤芍藥二兩炒香白芷一兩曬燥忌火炒獨活一兩五錢炒石菖蒲一兩五錢曬乾忌火上依法共為末篩細以好酒和蔥五莖煎滾調搽不必留頂一日一換以腫消不痛為度無名腫毒方二十生大黃取整者用青布包裹扎緊於五月五日午時入露天糞坑內浸至十二日午時取出清水洗淨風乾醋磨敷患處神驗坎宮錠二十一治一切癰疽漫腫無頭根腳不聚等症用敷患處四圍胡黃連焙芙蓉葉曬脆或烘兒茶真熊膽文蛤焙黑真西黃各三錢辰砂水飛川貝母各二錢梅花冰片真麝香各五分真陳京墨一兩夾碎研各研細末和勻再乳用生大黃五錢滷醋一茶杯健豬膽二枚滴汁三味熬稠膏作錠陰乾用芙蓉汁和蜜磨敷陽和湯二十二治一切陰疽色白不起發勢將內陷者飲之立救並寒凝痰核根深難潰與犀黃丸見前五號間服取效熟地一兩白芥子二錢鹿角膠三錢肉桂生甘草各一錢薑炭麻黃各五分水酒各半煎服加法制半夏一錢五分陳皮八分尤妙金鎖比天膏二十三治癰疽發背無名腫毒疔瘡鼠串馬刀瘰癧紫疥紅絲鴉焰漏睛等瘡兩腿血氣內外臁瘡魚口便毒楊梅結核金瘡杖瘡蛇蠍蟲咬虎犬人傷頑瘡頑癬久流膿血萬般爛瘡風寒痰濕四肢疼痛乳癖乳岩其未破者用蔥椒湯已破者蔥湯洗淨貼之如初發勢重將膏剪去中心留頭出氣不必揭起一膏可愈一毒攤時不可見火必須重湯化開山甲一具或淨甲一斤劉寄奴去根切絲野麻根蒼耳草連根葉子紫花地丁豨蘞草各一斤蝦蟆皮一百張或乾蟾一百隻更妙各草藥鮮者為妙用真麻油十二斤將四斤先煎穿山甲枯焦餘八斤浸各藥冬七日春秋五日夏三日加老酒蔥汁各二碗文武火煎藥枯去渣復煎至滴水成珠每藥油一斤加飛丹八兩看老嫩得宜離火不住手攪下牙皂五靈脂去砂研大黃各淨末四兩待溫下藝香末四兩成膏水浸三四日用神效桑枝炙二十四治發背不起或瘀肉不潰此陽氣虛弱用桑枝捻著吹熄其焰用火炙患處片時日三五次以助腫潰若腐肉已去新肉生遲宜炙四畔其陰瘡瘰癧流注臁瘡惡瘡久不愈者亦宜用之大抵此法未潰即解熱毒止疼痛消瘀腫已潰則補陽氣散餘毒生肌肉若陽症腫痛甚或重如負石初起用此法出毒水即內消其日久者用之雖潰亦淺且無苦楚惜患者不知有此治者亦不肯用此也神仙熏照方二十五雄黃硃砂真血竭沒藥各一錢麝香二分上五味研細末用棉紙卷為粗捻約長尺許每捻中入藥三分裹定以真麻油潤透點灼瘡上須離瘡半寸許自紅暈外圈周圍徐徐照之以漸將捻收入瘡口上所謂自外而內也更須將捻猛向外提以引毒氣此是手法此藥氣從火頭上出內透瘡中則毒隨氣散自不內侵臟腑初用三條漸加至五七條瘡勢漸消可漸減之熏罷隨用後敷藥敷藥方二十六車前草豨蘞草金銀花五爪龍草上四味鮮草等分同搗爛加多年陳小粉仍加飛鹽少許共調為稠糊敷瘡上中留一頂拔膿出若冬月無鮮者用干葉為末陳醋調敷亦可或五爪龍草一時難得即單用三味和陳小粉亦能奏功艾葉回陽散二十七治陰疽發背陷下不痛者用真艾葉一斤硫黃雄黃末各五錢水同煮半日搗極爛乘溫敷上再煮再易十餘遍兼用神仙熏法數次知痛可生不知者死隔皮取膿法二十八凡患毒深遠刀難直取並患人畏懼開刀者俟膿熟時用此法甚善如膿不從毛竅出者若用藥塗之其不塗藥之處旁邊綻出一洞自會出膿驢蹄皮一兩即腳底剔下者是炒用蕎麥麵一兩草烏四錢刮去皮研共為末和勻加食鹽五錢以水糊作薄餅瓦上炙微黃色再研細以醋調攤白紙上貼患處其膿水自從毛孔而出蓋以草紙滲濕再換膿盡紙燥腫即消黑龍丹二十九治一切惡瘡怪毒或生於橫肉筋窠之間因擠膿用力太過以致胬肉突出如梅如栗翻花紅赤久不縮入此乃損傷筋脈使然不明其義輒以降蝕腐化但去其小者復又突出大者屢蝕屢突經年不愈用此方立可奏效大熟地切片烘乾炒枯烏梅肉炒炭上以枯熟地末一兩配烏梅炭三錢共研極細摻膏藥上貼之不過三五日其胬肉收進隨用地栗生肌粉見後三十八糝膏上貼患處收口即愈凡陰虛腎氣不足之人或患脫肛諸藥罔效用此方以防風升麻各一錢煎湯調搽立即收上兼內服補中湯見內症十號五福飲見內症十七等煎劑後不復發烏金膏三十巴豆一斤去殼衣淨肉放鍋內炒化為油去火毒凡瘡腐爛將油薄搽其上其腐自脫或患處結實不潰膿不出將油搽在瘡上外蓋膏藥過夜實化為膿清涼膏三十一治一切瘡瘍潰後宜用之當歸二兩白芨白芷木鱉子黃柏白蘞乳香白膠香各五錢黃丹五兩用真淨麻油十二兩煎前六味槐柳枝順攪油熟丹收然後下乳香膠香二味蜣龍丸三十二治一切遠年瘡毒起管成漏膿血時流久不收口服此自能收功韭菜地上蛐蟺十六兩以酒洗淨泥蜣螂八個即推車蟲又名扒痾蟲穿山甲一兩麻油炒黃研末刺蝟皮連刺五錢同上二樣俱瓦上炙研末真象牙屑一兩另研極細上末共和勻再研煉蜜為丸桐子大大人每服八分小兒每服五分俱開水送下服藥未完其管自能逐節推出以剪子剪去敗管勿傷肌肉藥畢管亦褪盡玉紅膏三十三治一切癰疽發背對口大毒膿潰已盡腐去孔深洞見膈膜者用此填塞瘡口自能生肌長肉收口當歸二兩白芷五錢紫草二錢甘草一兩二錢用麻油十六兩將前藥浸七日煎至藥枯漉去渣將油再熬至滴水成珠下白蠟二兩攪勻次下研細血竭四錢待冷再下輕粉四錢待成膏蓋好聽用愈陳愈佳凡瘡口深陷以新棉花蘸塗此膏塞之自能收口不得加減恐反不效八寶丹三十四治口舌潰爛並一切瘡毒癰疽發背膿潰毒盡未全完口者摻膏上貼之與生肌散並效西牛黃明血珀各二分生珍珠硃砂兒茶各一錢二分人中白二錢煅馬勃八分滴乳石一錢六分各為淨末和勻研至無聲為度香蠟生肌膏三十五用白丁香一錢即公麻雀屎麻油一兩黃蠟三錢熬成膏遇諸瘡不收口將此膏填滿瘡口外蓋膏藥一二日自能生肌收口湯火傷用此膏搽之次日即愈膿潰生肌散三十六治癰疽膿毒潰盡肌肉不生每用少許摻膏上生龍骨三錢螵蛸熟石膏各二錢干胭脂陳石灰象皮各一錢煅浮干石六分珍珠八分各為淨末研細如飛面乳沒生肌散三十七紅升血竭生乳香生沒藥麝香冰片各等分研細生肌地栗粉三十八治一切外患潰後余肉已盡新肌未生摻膏上可漸收口荸薺一兩去皮磨粉真象牙屑川貝雲苓各五錢上藥取末和勻再研極細穿骨散三十九治貼骨疽患起自環跳血又名縮腳疽皮色不異腫硬作痛者是白芥子不拘分兩搗粉用白酒釀調敷內服陽和湯見前二二每日一劑四五服可消消後接服子龍丸小金丹每日各一服早服子龍丸晚服小金丹二服止以杜患根大忌開刀開則定成縮腳損疾如疽患延蔓日久真氣大虧應用養營煎見前六號並陽和見後喉口類二四保元見後喉口類二六等湯丸治之子龍丸小金丹均忌用子龍丸四十甘遂麵裹煨熟白芥子炒研末大戟取杭州紫大戟水煮軟去骨用各等分蜜丸如芥子大日服三次每服三分淡薑湯送下忌與甘草同服虛人禁服小金丹四十一治流注痰核瘰癧乳岩橫痃等症初起服之即消白膠香草烏五靈脂地龍木鱉各制末一兩五錢乳香沒藥當歸身各淨末七錢五分麝香三錢墨炭一錢二分以糯米粉一兩二錢為厚糊和諸藥末千捶為丸如芡實大一料約為二百五十丸曬乾忌烘瓷瓶收貯臨用取一丸布包放平石上隔布敲細入杯內取陳酒幾匙浸藥用小杯蓋合約浸一二時加熱陳酒調下醉臥取汗如流注等症將潰或潰久者當以十丸作五日早晚服使患不增出但丹內有五靈脂忌與參藥同服鳳眉透腦二疽治法四十二鳳眉疽發在兩目之間形長皮赤痛引腦戶二目合縫透腦疽發在額上髮際之間多發寒熱頭痛如斫先用萬靈丹見前三號發汗解散風邪可二服次用益氣養營煎見前六號數劑並用赤小豆見前十四解凝見前十二等散敷之可消大棗丸四十三治風濕熱毒癰疽等患日久潰爛將見內腑者山羊糞曬乾炒炭存性磨粉八兩上用大棗去皮核淨肉八兩不用煮搗爛如泥和前粉捶成丸每服四錢黑棗湯下服至腐去生新外貼膏加膿潰生肌散見前三六可漸收口附血癤方四十四初起形如赤豆大色極紅若皮一穿破血向外射必致殞命急覓大蟾一隻剝皮貼癤上其血即止四五日後自然褪下而愈若未褪下切忌揭開附血箭方四十五一竅如針眼出水不止或生肘上或生眼角用真麻油四兩無灰酒八兩和勻熱服其血即止再以野菊花濃煎常飲切忌茶湯疔毒類按疔瘡乃外科迅速之病有朝發夕死或隨發隨死或三五日不死至一月半月而終死者其瘡最惡其毒最烈治之方雖多而應手奏效者實少所輯諸方實有起死回生之功真可謂之神授諸疔皆治但疔有數種部位既殊形色亦別其發甚微人多疏忽若不指明貽誤非淺火焰疔多生唇口手掌指節間其發初生一點紅黃小泡抓動癢痛非常左右肢體麻木重則寒熱交作頭暈眼花心煩發燥言語昏憒此等出於心經之病也紫燕疔多生手足腰脅筋骨之間初生便作紫泡次日破流血水三日後串筋爛骨疼痛苦楚重則眼紅目眛指甲純青舌強神昏睡語驚惕此等出於肝經之病也黃鼓疔其發初生黃泡光亮明潤四邊紅色纏繞患多生口角腮頰眼泡上下及太陽正面之處發之便作麻癢繃急硬強重者噁心嘔吐肢體木痛寒熱交作煩渴乾噦此等出於脾經之病也白刃疔其發初生白泡頂硬梗突破流脂水時痛時癢易腐易陷重則腮損咽焦毛聳肌熱咳吐膿痰鼻掀氣急此等出於肺經之病也黑靨疔多生耳竅胸腹腰腎偏僻軟肉之間其發初生黑斑紫泡毒串皮膚漸攻肌肉頑硬如釘痛徹骨髓重則手足青紫驚悸沉困軟陷孔深目睛透露此等出於腎經之病也紅絲疔起於手掌節間初起形如小瘡漸發紅絲上攻手膊令人多生寒熱甚則噁心嘔吐遲治紅絲至心常能害人用針於紅絲盡處挑斷出血方妙凡治疔毒貴在乎早更易痊可倘若分辨不清以生黃豆令病人嚼之不腥乃疔毒也依方施治百無一失神驗疔毒丸一治一切疔毒大黃巴豆去心皮生用雄黃各三錢上三味共合一處用石臼杵搗爛如泥以飛羅面陳醋煮糊同藥搗極細爛為丸如鳳仙子大病重者二十三丸輕者二十一丸再輕者十九丸單數為度放在舌上熱水送下服後打噎則愈如泄更好俟泄三四次即以新汲井水飲之則止如病重不省人事將二十三丸用開水和開從口角邊灌下服後將病人扶起端坐片刻即醒至輕者可不服初服藥時勿吃涼物冷水恐不泄瀉忌雞魚蔥蒜牛馬犬肉並炙爆辛熱飲酒房事至七日方好不可疏忽有金線巴豆最妙拔疔散二治疔瘡一時疼痛非常亦陽症也但忽生之時難辨以生黃豆嚼之不知腥臭即是疔毒其瘡頭必發黃泡中或現紫黑之色更須細看泡中必有紅白一線通於泡外大約疔生足上紅線由足入臍疔生手上紅線由手入心疔生唇上紅線由唇入喉如見此紅線之盡處用瓷鋒刺出毒血免毒氣攻心白線不必刺破甘菊花紫花地丁各一兩用水煎服一劑紅白線退二劑疔毒消三劑全愈若已潰者亦用此方加當歸二兩治之不必四劑而肉生矣皂礬丸三治一切五色疔瘡初起或有小白頭一粒或癢或麻木憎寒發熱及疔毒走黃黑陷昏憒嘔惡等症豬牙皂切碎研細末白礬生研極細各三錢真乾蟾酥一兩切片上將蟾酥用滴花燒酒浸軟加入礬皂二末和勻搗為丸如緑豆大晾乾收貯每服一丸將蔥白衣裹藥以好酒送下勢重者每日服二次此藥每次止可服一粒如服兩粒恐致嘔吐慎之慎之或加麝香三分同搗為丸更妙拔疔祕方四鰣魚靨用手拈下不見水陰乾收貯用時以銀針撥開疔頭將一片貼上以清涼膏見前外症三一蓋之俟一宿揭開其疔連根拔出後用乳沒生肌散見前外症三七收功一方用銀硃濫雞屎各一錢荔枝肉烏梅肉各十個蝸牛十條先用麝香塗疔口將前藥共搗敷上痛即止其疔一夜拔出菊花散五治疔腫惡瘡危急垂死者用菊花葉或根不拘分兩搗汁酒沖熱服取汗渣敷患處清裡散六治癰疽疔毒內攻患處麻木嘔吐昏憒牙關緊閉有奪命之功熟石膏五錢徽州上等松蘿茶一兩為末大人服三五錢小兒服二錢生蜜調和空心熱酒送下立效如神日進二服有回生之功回疔散七治一切疔毒走黃神昏發腫用土蜂窩有子者一兩蛇蛻一條泥裹火煅存性為末研和每服二錢開水下少頃大痛痛則許救毒化黃水痛止命活疔瘡走黃八疔瘡誤食豬肉走黃法在不治急搗芭蕉根汁服之可救救唇湯九治唇上生疔或口角或上下唇最宜速治否則火毒炎炎且難飲食往往有腐潰而死者兼治頭面上疔紫花地丁金銀花各一兩白果二十個桔梗生甘草知母各三錢用水煎服未潰者三劑潰者五劑取效一治各種疔毒及癰疽腫毒初起用白菊花連根一株去泥淨蒲公英無葉取根紫花者更妙各等分搗爛取汁沖酒服渣敷患處立刻消散一治疔腫流火並一切外患紅腫焮痛取煤塊黑亮者研極細末陳醋調敷干則頻頻潤濕痛止腫消神效一治石片疔毒是症多由患外症起蒜艾炙之過度火氣內逼風因火發致肉如石片飛去用家菊花葉芙蓉根芭蕉根忍冬藤各五錢搗汁煎地漿水沖服外用井底泥敷患處一治鼻內疔用爛黃雞屎荔枝肉同搗爛塗患處即愈一治指頭蛇疔用生雞蛋一個去白用黃以荔枝肉嚼爛攪勻裝入殼內套指頭上即消一治烏茄疔是症由農家糞地上經烈日曬過赤足行走受此熱毒必至足趾腫痛似潰非潰用鴨毛煎湯和皂礬洗之立瘥瘋痰瘡毒類營衛保和丸一專治大麻瘋症元參熟地蒼朮蒼耳子苡仁茯苓各四兩銀花六兩生甘草一兩荊芥四兩煎汁跌丸百沸湯下每服四錢日再服分早晚患者忌生冷鹽醋宜白淡大瘋丸二治大麻瘋症服者須吃白淡艱於忌口者不效大楓子不可見火小胡麻白蒺藜去刺各二十兩蒼朮荊芥曬各六兩牛膝川斷各四兩苦參十二兩防風曬八兩蟬蛻去頭足五兩蛇蛻白淨者去頭足三兩上各取末用白鳳仙花葉六兩煎汁跌丸每早三錢毛尖茶下風痛藥酒方三治風寒濕氣乘虛入於筋骨日夜疼痛不拘遠年近日皆效熟地丹參秦艽當歸杜仲炒牛膝枸杞子各二兩川芎羌活防風天麻煨威靈仙虎骨酥炙油松節廣木香於潛白朮各一兩米泔浸炒擇道地之藥如法制度俱曬極干用陳酒二十斤將一半同藥隔湯煮大線香三炷待冷定取開將所存酒一半衝入封固停三日後早晚隨意溫服一二杯大麻瘋方四全身發腫鬚眉脫落兩腳臭爛是方並治用大蟾一隻泥裹燒熟去泥乘熱放瓷碗內以滾黃酒衝入即用碗蓋蓋之泡半時只服酒取汗為度一服愈一方用扁柏葉九蒸九曬為末每服一錢一日三服滾水下忌鹽醬一方治大麻瘋症遍體生瘡用水浮萍漉起入稀布口袋浸長流水中三日取起每萍葉一兩加甘草節五錢煎濃湯大缸浴浸半日大效神方也須食飽浴之鵝掌風方五用連須蔥白搗汁半斤熬成四兩入好蜜四兩再熬一半每晚搽之終身忌食鵝肉鶴膝風方六由於外感寒濕本質未潰者敷此可消如小兒先天不足或大人氣血久衰須內服五益膏見前內症四號用牛膝一兩五錢全歸一兩虎脛骨五錢浸無灰酒三斤每晚一杯化膏五錢服之外敷此方乃可取效用肥皂二個去子五倍子去灰皮硝各一兩共研末用頭酒糟四兩砂糖一兩薑汁半茶鍾和搗蒸熱敷膝上如干加燒酒潤之十日愈一方用白鳳仙連根葉搗汁一大碗同薑汁對熬入廣膠四兩和化成餅貼裹患處冷即烘熱貼之紫白癜方八用芝麻花同自己小便頻擦患處過半日洗去如失遍體瘋癢方九胡麻威靈仙何首烏苦參石菖蒲各三錢甘草二錢共為末每服三錢陳酒下瘰癧痰核內消方上真鉛三兩鐵器內炒取黑灰陳醋調塗以舊帛貼之頻換去惡水半月取效不痛不破內消為水而愈蹲鴟丸十治男婦大小頸項下耳前後結核瘰塊連珠癧串不疼不痛或破微疼皮赤潰爛久不收口年近者一料收功年遠者服兩料全愈真香梗芋艿十斤去皮不見火切片曬極干上磨為末以開水法丸早晚每服三錢甜酒送下如不吃酒者米湯調下或吃芋艿乾片酒過亦可此法不用膏丹別藥傳授貧人功莫大焉並治喉癬亦效三妙散十一治結核瘰癧遍滿脖項神效夏枯草金銀花蒲公英各五錢水酒各半煎服濕痰流注神方十二陳膽星二錢川貝殭蠶炒銀花槐花炒五倍子各三錢橘紅秦艽防風木通各一錢甘遂去皮防己各八分皂角子鮮者九粒打碎肥皂子鮮者十粒打碎土茯苓四兩瓷鋒刮去皮木杵打碎痰在背加羌活五分在脅加柴胡五分在頭頂胸前加夏枯草三錢在肚腹如赤芍二錢澤瀉一錢在臂加獨活五分在腿加木瓜二錢牛膝一錢五分虛人加石斛苡仁各一錢用河水九碗煎三碗早午晚各服一碗痰在心之上食後服在心之下食前服如虛者分二劑極虛者分三劑小兒分四劑忌食鹽醬茶醋豬肉鮮魚雞鵝發物煎炒薑椒煙酒生冷方內有甘遂恐別樣丸散內有甘草相反者切不可並服已破者只服四五劑不致流於他處隨用十全大補湯方見後十三加川貝二錢五分石斛二錢乳香炙四分須數十劑全愈如多火之人十全大補湯內減去肉桂十全大補湯十三黨參白朮茯苓川芎當歸白芍熟地黃耆各一錢炙甘草五分肉桂三分白水煎服消痰丸十四治痰患初起可消已成膿者服之減輕山甲炙大黃明礬各十六兩杏仁霜當歸身各八兩川芎四兩各取淨細末水法為丸每服三錢白湯下石珍散十五治一切火瘡天泡瘡石膏煅四兩青黛黃柏各一兩二錢井泥曬乾八錢各取淨末研細和勻收貯用生地汁調敷天泡瘡方十六用蠶豆莢殼炙灰菜油調搽或用蓮蓬殼灰井水調敷俱效蛤粉散十七治頭面耳周身忽生黃栗破流脂水頃刻延開多生痛癢此因日曬風吹暴感濕熱或因內傷濕熱之物風動火生石膏煅蛤粉各一兩黃柏生研五倍子各五錢共研極細末麻油調搽一二日全愈瘡久不愈效方十八不拘膿顆疥瘡俱效大生地赤首烏各三錢當歸身淨銀花炒白芍各一錢五分生甘草六分川芎七分白蘚皮八分丹參一錢二分水煎沖酒一杯間日一劑又洗藥方十九苦參六錢地膚子二兩川椒一錢五分又擦藥方二十芙蓉葉菊葉各六錢荊芥穗一錢生甘草二錢銀花三錢研極細末用茶油調勻頻擦之芙蓉菊葉鮮者更妙牛皮癬癩方二十一土槿皮一斤勿見火曬乾磨末以好燒酒十斤加榆面四兩浸七日為度不時蘸酒搽擦二三十年者搽一年斷根如槿皮有川産者更佳一切癬癩並治漆瘡方二十二螃蟹唾沫蘸搽或磨刀水泥塗之或用杉水煎湯洗或用蟹殼同滑石末蜜調敷並效燙瘡膏二十三治湯火燙傷全當歸梔子各六錢槐枝十四寸榆皮八錢菜油八兩熬膏隔水化開塗傷處水石散二十四治一切湯火燙破寒水石赤石脂等分為末用菜油調搽破爛有水者將末灑患處汗斑方二十五密陀僧為末以隔年陳醋調搽兩腋狐臭方二十六明礬細末擦之浴後及出汗後再用搽擦常擦可愈檳黃散二十七專治遠年大小臁瘡臭爛難收口者先敷此藥俟瘡口平滿肉轉紅色再貼夾紙膏檳榔黃柏蒼朮黃丹各等分為末和勻菜油調搽夾紙膏二十八治臁瘡收口定粉四兩粳青三錢紅土八錢各取末先將桐油熬熱再下末藥攪勻以厚紙二面拖上待乾出火氣驗瘡之大小剪貼一面貼三日換之血風濕爛臁瘡方二十九黃柏末甘草末各五錢輕粉二錢研細糞池中舊磚瓦洗淨以炭火燒紅淬入醋內如此七遍為末一兩共為一處桐油調敷早晚二次先用米泔水洗然後上藥血瘋散三十專治遠年近日爛腿血瘋等瘡煙膠紅土各四兩水龍骨二兩各為細末和勻桐油調敷間日一換蔥水洗腳墊傷痛方三十一人走長路緊急被石塊腳底墊腫不能行走痛不可忍急用舊草鞋底浸尿桶內一夜將新瓦磚一塊燒紅以浸濕草鞋放磚上隨以腳踏上火逼尿氣入內即消如走長路兩腳腫痛亦用此法若不早治恐潰爛難愈腳氣成漏方三十二腳跟一孔有水流出其痛異常以人中白煅研摻之即愈腳氣攻注方三十三急取大田螺數個搗爛敷於兩足股上便覺冷趨至足而安治腳粗如木桶方三十四用鳳仙花葉梗多多搗汁煎濃以筆塗之以消為度腳氣疼痛方三十五用廣膠三兩薑蔥各半斤搗汁另將陳酒糟取汁一二兩或用米醋一碗和陳糟舂用細絹濾去渣取汁同前藥煎成膏布攤貼之立刻止疼消腫一方治兩足痛如刀剜不可忍不紅腫者是症由於濕熱積於皮里氣不得達先用生薑切片蘸香油擦痛處隨用生薑燒熱搗爛敷患處須臾薑干痛止痔瘡方三十六大生地馬齒莧象糞魚腥草槐花野茄根鳳尾草各二兩全當歸銀花胡黃連野菊花五倍子密陀僧龍骨黃芩各一兩五錢白芷赤芍防風元參荊芥各一兩共炒研為細末用瓷罐收貯封口勿泄氣每用五錢加冰片三分研細和勻真麻油調敷乳岩治法三十七此症男婦皆有因憂鬱積忿而成始而乳內結核不痛不癢或二年或四五年不消其核必潰潰則不治初起用犀黃丸見前外症五每服三錢酒下十服全愈或以陽和湯見前外症二二加土貝五錢煎服數日可消倘誤以膏藥敷貼定至日漸腫大內作一抽之痛已覺遲延倘皮色變異難以挽回勉以陽和湯日服或以犀黃丸日服或二丸早晚輪服服至自潰而痛者取大蟾俗名癩團六隻每日早晚破蟾腹連雜以蟾身刺孔貼患口連貼三日內服千金托裡散方見後三日後再接服犀黃丸可救十中三四不痛而癢極者一無挽回大忌刀開開之則翻花最慘不救矣千金托裡散三十八治一切癰疽疔毒乳岩乳癤日久不起發或膿出不快內因寒鬱等症黨參四錢生黃耆熟黃耆白芷當歸各一錢五分上官桂五分川芎桔梗各一錢厚朴炒甘草節防風各八分遠志肉三錢引加菊葉蒲公英各一錢五分一方治乳癰串爛年久不愈洞見內腑者取搖船之櫓上首手捏處舊藤箍剪下陰陽瓦上焙末用竹管扎繃小篩日日摻之如干處以香油調搽不過半月全愈一方治心窩成漏潰腐浸淫經久不愈用地栗生肌粉見前外症三八看瘡大小日日搽之並治乳頭開花每藥一錢加冰片五釐用乳汁調搽梅瘡丹毒類梅瘡初起方一用豆腐四兩中心開孔入杭粉二錢盛一碗內蒸熱先將蔥三根略煨嚼下後吃完腐粉再飲熱燒酒一二杯用棉被蓋暖於不通一線風處臥出臭汗一身人不可近近則過毒汗要出盡衣被送於野處露洗之梅瘡七帖散二金銀花三兩生豬油一兩土茯苓四兩忌鐵器打碎直殭蠶七條研皂莢子七粒打碎蟬蛻七枚翅足全洗淨肥皂核肉七枚共作一劑三次煎服早晨空心用水六茶杯煎三杯服午前四杯煎二杯服臨臥二杯煎一杯服每日一帖連服七日未發者暗消以發者收斂永無後患毒深者用十四帖治梅瘡經驗方三生羊肉四斤用水十大碗煮熟去肉留湯撇淨油珠用土茯苓四兩入湯內煮見金紅色去土茯苓留湯備用金銀花防風葶藶桔梗大黃各一錢木瓜二錢用前湯煎半炷香時候勻作三碗早午晚各服一碗連服三次可愈如瘡稍輕者以豬肉三斤代羊肉亦可如有腐爛用後生肌散梅毒生肌散四軟石膏白龍骨各三錢海螵蛸一錢松香五分共研細末用粗夏布包末藥撲患處丹石結毒方五凡服過房術丹石之藥變生淫濕廣瘡醫復圖功敏捷投以隱藥治之致成結毒終身不愈者用紅棗三斤以杉木作薪炊棗其火逐次鉗出悶炭俟棗爛為度剝去皮核將所悶之炭盡數磨末和棗肉搗勻丸如彈子大每日任意嚼之土茯苓湯過下久久服之勿得間斷周身瘡毒可保無虞蓋紅棗能解丹石之毒杉木專祛濕熱之侵乃治梅花結毒第一方也結毒穿鼻方六龜板真酒漿炙三次取淨末二兩硃砂水飛過研細末各二錢九孔石決明童便淬煅取淨細末上依法制和勻用黃米飯搗為丸如桐子大每服一錢土茯苓一兩五錢煎湯和好酒送下看病上下食前後服如服過硫黃者以水芹菜煎湯服中宮丸七治楊梅丹毒初起及久害俱效黃土三十二兩赤苓皮六兩生大黃槐花各八兩明礬生甘草各四兩為淨末水法為丸桐子大每服三錢用土茯苓二兩煎湯送下鼻疳穿爛方八明礬瓦上煅過鹿角各一錢人發五錢燈上燒灰存性各為細末花椒湯洗患處敷將藥末干糝之如不收口加瓦松燒灰五錢和入敷之銀青散九治男子下疳疼極潮癢女子陰戶兩旁淫濕瘡瘍膿水淋漓紅瘰腫疼並治玉莖梅瘡蛀腐及小兒痘疤橫爛並痘後餘毒不清滿頭髮黃泡等瘡用此皆效白螺殼取牆頭上白色者佳火煅揀去泥研細取淨末一兩橄欖核火煅存性研取淨末寒水石另研極細取淨末各二錢梅花冰片臨用時每藥二錢配冰片一分上共研勻以瓷瓶盛貯勿使出氣臨用時以麻油調搽其濕處乾摻之神效橫痃方十用菜油三兩入少年男子頭髮三錢銅杓煎枯去渣用去殼雞蛋三枚放碗內後滾油傾入連油連蛋食之立消礬蠟丸十一突生肛癰腫痛若離寸許名偷糞鼠若生於穀道前陰囊後名騎馬癰極為痛楚乃惡症也男女患之皆同治法生白礬白蠟上藥等分為末陳米飯為丸每服五錢空心開水送下止痛消毒三服取效若既潰者多服不至成漏屢經試效喉口類治咽喉紅腫疼痛痰壅聲啞方一用鮮土牛膝根一兩或二三兩洗淨去泥搗汁開水沖服重症可減輕症可愈加服大甘桔湯大甘桔湯二桔梗八分甘草一錢二分牛蒡子射干各六分防風元參各四分白水煎服熱甚者加黃芩去防風亦可一方用土牛膝根將人乳搗爛吹入如口不開者其蛾在左吹左鼻在右吹右鼻一方用自己指甲左剪三個右剪四個將銀器燒紅放甲在內煅為末男左女右吹鼻內解疫清金飲三治風火客感時行喉症蘇薄荷蘇橘紅牛子丹皮各一錢桔梗赤芍大貝各一錢五分花粉一錢二分甘草八分投數劑兼用吹散可愈濟陰化痰飲四治陰虛火灼憂思郁慮致成喉症小生地三錢銀花元參各一錢五分廣皮七分遠志柴胡各八分桔梗一錢二分川貝一錢赤苓二錢甘草六分投五七劑兼用吹散可愈二症愈後俱服清咽抑火丸見後十八旬日以杜後患清咽雙和飲五治一切喉症初起桔梗銀花一錢五分當歸一錢赤芍一錢二分生地元參赤苓各二錢荊芥丹皮各八分真川貝甘草各五分甘葛前胡各七分引加燈心一分地漿水煎膽貝散六治咽喉乳蛾一切喉症吹之立效川貝母生石膏各三錢花粉七分芒硝八分上藥各為細末用雄豬膽一枚調勻風乾研細末活命神方七專治喉風喉痹單蛾雙蛾等症但陰虛喉痛者不可用當門子新江子仁去油真大泥冰片麻黃各一錢細辛山豆根各五分真西牛黃六分月石末老薑汁澄粉各三分各取淨末遇症用蘆管吹之點喉神效法八治喉間腫痛或爛出血大發寒熱等症用井華水四碗入剔牙松葉一握煎至三碗用人中白三錢研極細每碗入一錢調勻能飲者飲之不能飲者取匙漸滴患處不論喉間何毒點之即效治喉蛾方九枯礬二錢桑繭燒灰雞肫皮各一錢燒灰喜蛛壁窩二十一個燒灰珍珠三分豆腐內煮同燈草研共研末無聲為度用蘆管吹之一方治患喉蛾已經氣絶心頭微溫者於冬天三九時候取老豬婆糞放屋上日曬夜露七日取下火煅至煙盡為度以水調如粉粥徐徐灌之能下總無不活治喉風方十舌大如脬即時不救立死者冰片一分火硝硼砂各三分殭蠶五分膽礬青黛各二分共為細末吹入即解一方凡患乳蛾咽喉腫痛刺少商穴血出即松少商穴在大拇指頭甲蓋旁間一韭菜葉許即是男左女右刺之又患在左刺右指患在右刺左指一方凡生乳蛾者頭頂發內必有紅泡一個用銀針挑破出血毒泄吹藥尤效治喉癬方十一喉症惟此最遲久則失音不可救西牛黃冰片各一分山羊血二分川連燈草灰各五分橄欖核灰血珀各三分硼砂一錢共為細末每一茶匙藥用一茶匙蜜調之放舌尖上徐徐咽下一日五次兩月可愈或加蜒蝣梅核燒灰二分於此方內更妙蜒蝣梅方十二將瓦罐貯霜梅半罐僅數以蜒蝣入之藏好患咽喉症者取梅一枚含舌底即有清水流出其性極寒不可咽下須覆臥張口將清水吐盡喉內自松立解咽喉腫塞方十三用夏枯草花十斤水梨肉一百斤同煮膏貯甕中埋地下一年後取出患者含少許即消走馬喉痹方十四用土牛膝根搗汁漱之對節方梗緑葉有紋者是或用牽牛鼻繩燒灰吹之咽喉閉塞方十五臘月初一取豬膽五六枚用黃連青黛薄荷殭蠶白礬朴硝各五錢裝入膽內青紙包好將地掘一孔方深一尺以竹橫懸豬膽在內地上仍蓋好至立春日取出待風吹去膽皮青紙研末密收吹之碧雪丹十六治一切風痹蛾癬時行諸喉症俱可用吹已經潰爛者倍珍珠加珀琥四分真紫金藤八分俱要研細土牛膝根鮮者五兩乾者七兩銀花葉鮮者四兩乾者六兩白蘿蔔苗四兩如無苗即用去皮淨肉七兩荸薺苗五兩如無苗即用去皮淨肉十兩以上四味用囊盛之入長流水浸一宿取起帶水磨攪勻澄清取粉每粉一兩為一料配入後藥遠志八分去心甘草水泡殭蠶甘草水泡去水上浮涎硼砂真川貝馬勃各五分西牛黃五釐人中黃人中白丹皮各一錢桔梗三錢冰片三釐珍珠四分以上遠志桔梗丹皮殭蠶四位用文火焙余各生研極細無聲為度並前粉和勻是方為丸含舌下亦可為丸用土牛膝鮮者一兩和人乳汁半酒杯搗汁加當門麝三釐和藥跌丸如緑豆大十葉散十七芙蓉葉荷葉蕉葉菊葉銀花葉紫蘇葉柳葉槐葉冬桑葉天名精葉各應時採鮮者風乾為末候十葉備齊等分和勻瓷瓶收貯猝遇喉症外用蘆管吹之內用甘草桔梗湯或開水調下每服七分如遇無名火毒焮腫紅赤兼可敷消取井華水調敷患處清咽抑火丸十八生地六兩丹皮麥冬金果欖元參各四兩連翹去心山梔各二兩甘草一兩五錢北沙參白芍歸尾桔梗各三兩遠志澤瀉各一兩荊芥穗二兩五錢川黃連五錢各取淨末和勻煉蜜為丸桐子大每服三錢開水下口舌瘡方十九用黃連炮薑灰青黛兒茶各等分為末摻之翣舌方二十卒然舌大硬腫咽喉腫閉即時氣絶名曰翣舌至危之症急用皂礬不拘多少以新瓦火煅紅色放地上候冷研細以鐵鉗拗開牙關將藥頻擦舌上立效如神飲以真百草霜酒調下三錢並用百草霜和酒塗之或蒲黃乾薑等分為末摻之內用甘草濃煎漱之唇裂血出方二十一用黃柏末以薔薇根汁調塗骨槽風方二十二患在腮內牙根形同貼骨疽者是初起若誤認牙疼多服生地石膏以致爛至牙根延爛咽喉不救當用二陳湯加陽和丸煎服或陽和湯見前外症二二消之潰者以陽和湯犀黃丸見前外症五每日早晚輪服如有多骨以推車散吹入隔一夜其骨不痛自行退出吹至次日無骨退出以棗甲生肌散吹入內服保元湯收功而止二陳湯陽和丸推車散保元湯棗甲生肌散五方俱開後二陳湯二十三橘紅五錢製半夏二錢茯苓一錢炙甘草五分陽和丸二十四肉桂五錢麻黃一錢五分薑炭三錢取末蜜水跌丸如緑豆大每服六分和二陳湯內同煎或送下推車散二十五取推車蟲炙研每一錢入乾薑末五分研和吹保元湯二十六肉桂五分生黃耆四錢生甘草八分若膿厚接服陽和湯見前外症門二十二棗甲生肌散二十七指甲五錢用紅棗去核逐個包甲以長髮五錢扎棗同象皮薄片五錢瓦上炙溶成團存性研末加麝香一錢冰片三分固貯人中白散二十八治男婦大小口舌糜爛走馬牙疳並咽喉腫痛牙床腐潰等症真青黛硼砂人中白粉兒茶各一錢元明粉馬勃龍腦薄荷葉各五分梅花冰片二分共研勻碾極細擦之如病甚者可加西黃三分珍珠五分其效尤捷咽喉病以蘆管吹之日三次夜二次牙痛分經治法煎方二十九生地甘草防風熟石膏荊芥牡丹皮青皮各一錢上門牙屬心加黃連五分麥冬一錢下門牙屬腎加黃柏知母各一錢上邊牙屬胃加乾葛白芷各一錢下邊牙屬脾加升麻四分白芍一錢上右盡牙屬大腸加枳殼五分大黃一錢下右盡牙屬肺加黃芩桔梗各一錢上左盡牙屬膽加龍膽羌活各八分下左盡牙屬肝加柴胡五分黃芩山梔各七分牙痛漱口方三十生石膏末麥冬各五錢牛膝青鹽各一錢上四門牙心火加條芩木通燈心下四門牙腎火加知母黃柏元參左邊上牙膽火加膽草白芍柴胡左邊下牙肝火加青黛蘇葉右邊上牙肺火加桔梗桑白皮條芩右邊下牙脾火加石膏竹葉元明粉以上俱一錢水煎對症漱之一方凡人無病忽然齒長妨食名曰髓溢以白朮煎湯漱口即瘥陰虛牙痛方三十一赤芍元參各一錢二分銀花一錢生甘草四分引加燈心一分桂圓肉五枚牙痛散三十二月石火硝各等分取淨末每藥一兩外加冰片三分擦之蟲牙散三十三雄黃五錢蓽茇八錢上冰片八分各取淨末和勻瓷瓶收貯牙齒蟲蛀作痛用擦之口舌糜腐方三十四大紅薔薇花葉曬乾或隔水焙燥忌火炒研末和冰片少許搽擦如冬月無葉用根亦效牙疳方三十五舊紅褐子燒灰甘蔗皮燒灰紅棗肉壁蟢窩土牆上者佳炙狗屎內骨頭燒灰各七分俱用陰陽瓦焙為末先將瘡用米泔水煎洗後用甘草湯候溫洗淨然後吹藥耳目類耳膿方一用胭脂産濟寧州如銀硃樣紫色者可用棉胭脂油胭脂俱不可用枯礬飛過者釘鏽粉等分為末吹耳後出血方二凡人耳後髮際搔癢小竅出血用止血藥不效者此名發泉取多年糞桶箍燒灰敷之立愈如指縫出血亦然或用炒甲片細末罨之亦止治耳內干痛時或有膿耳外紅腫結身雍方三內治服歸芍地黃丸即內症八號六味地黃丸加歸芍銀花八分炒梔五分生甘草三分鉤藤鉤二分煎湯加青鹽少許送下早二錢晚一錢五分外治用干胭脂燒存性枯礬各五分海螵蛸一錢麝香一分共為末用鵝管吹入耳內結痂用茶子清油調雞翎蘸搽之結身雍用解凝散見前外症十二敷之眼患效方四赤芍銀花白蒺藜去刺丹皮當歸石決明取九孔者火煅蒙花各一錢生地三錢川芎六分甘菊花木賊各八分川羌活二分桑葉四片生羊肝五錢如無羊肝用黑芝麻三錢代之亦可如翳障久患不能常服煎劑者照方以分作錢以錢作兩外加生地二兩丹參二兩蟬蛻去頭足水飛一兩五錢洋參三兩生羊肝全黑者尤佳總用六兩各取淨末用桑葉四兩煎汁和蜜水跌丸每早三錢鹽開水下服之無間翳障漸退清肺散五治肺金氣盛克肝黑珠連生白星昏花澀痛桑白皮元參薄荷黃芩白蒺藜去刺紫蘇各一錢白蔻仁五分研甘草三分廣橘紅七分鹽水拌炒水煎食後服滋腎飲六治腎肝虛損精血枯竭瞳人散大目視無光熟地三錢天冬二錢去心五味子五分研枸杞子川黃柏青鹽水拌炒黑大豆二十粒牡丹皮川石斛甘菊花真阿膠蛤粉炒車前子各一錢水煎五更時服推雲散七治風寒外侵火熱內熾肝竅不利赤痛日久漸生外障翳膜防風木賊草秦皮荊芥羌活白蒺藜去刺炒蟬殼去土殭蠶去絲炒元參牡丹皮枳殼各一錢炒草決明二錢炒水煎食遠服偏風散八治偏風不拘左右頭目疼痛赤澀怕亮惡風眼眶漸小甚至害目俗名半爿頭痛治之極效蘇葉羌活防風荊芥蟬殼川芎細辛各一錢柴胡七分殭蠶炒松蘿茶各二錢甘草三分加蔥頭三枚水煎半飢時熱服護暖取汗避風一二日眼中胬肉方九蛇蛻一條以麻油炒黃色勿使焦黑加緑豆三合炒真砂糖一兩用水一碗煎成食遠服立退二三年者兩服即愈眼瞪成漏方十凡眼下空處生癤出膿流水不幹日久成漏諸藥不應者以柿餅去皮取肉搗爛塗之十日全愈洗眼方十一杏葉十片無根水一碗煎八分澄清洗之洗至一年目如童子洗目日期正月初八二月初十三月初五四月初一五月初五六月初七七月初七八月初九九月初七十月初十十一月初九十二月二二如遇閏月照前月日期若用桑葉不若銀杏葉之妙眼中堆起肉翳方十二向屠戶取豬鼻頭上尖沿邊一道皮煅研為末用好酒每早下三錢兩日後退淨眼內白珠夾起紅翳方十三用羚羊角磨四分杭菊花六分煎湯調下三四服自退昏花眼方十四用童便浸菊花洗之跌打傷損類跌傷接骨方一用大活蟹一隻腳爪全搗爛沖熱酒儘量飲醉再以渣罨患處半日骨內有聲即接傷在上者食後服在下者食前服骨碎垂危用乳香沒藥各三錢加骨碎補一錢五分沖蟹酒飲之並效一方治跌打閃挫傷損不出血但外有青腫紫色者先用蔥白搗爛炒熱敷痛處隨用生大黃研末薑汁調敷並儘量飲前蟹酒即愈跌打接骨敷藥方二此方百試百驗不可輕視勿以藥料甚賤而忽之也梔子炒黑面各三錢生軍不可見火沒藥各二錢劉寄奴薄荷骨川烏草烏各四錢薑十片蔥一把各藥槌爛加醋一小杯和勻炒熱敷患處外骨斷處用夾板夾緊對時一換若傷骨重者加桂枝一錢骨碎補二錢松香一錢方內生軍用五錢不腫不用醋皮破不用醋一方治跌打損傷碎骨在皮內作膿用田螺捶爛加酒糟同搗四圍敷上中留一孔其骨即出止血定痛散三治跌打損傷皮破血流真檀香陳礦灰雲苓各一兩蟬蛻去頭足水飛蛇蛻去頭足水飛生半夏各三錢珍珠一錢象皮一兩無象皮用真象牙五錢代之研細末無聲為度瓷瓶收貯遇跌傷取末糝患處立可止血定痛結痂後用真麻油調雞翎醮搽痂落後並無瘢點方內有生半夏切忌入口生肌定痛散治同前四真紫檀香丹參雲苓各一兩降香遠志各五錢琥珀血蠍各三錢取末和勻糝患處止血定痛如傷手傷風延蔓橫害每藥末一錢加蟬蛻蛇蛻各三釐糝患處糝後結痂不落用麻油稀調雞翎蘸潤之口瘡舌裂並可用吹一方治跌打損傷皮破血出倉猝不及用藥取真白蠟淨白糖霜各等分研細糝破處立可止血金刀散五治一切跌破血流不止及刀斧所傷用之止血定痛生肌松香夏果劉寄奴各等分為細末和勻糝傷處刀斧傷出血不止方六用陳石灰同韭菜搗爛陰乾研細每末一兩加紫黑降香節銼三錢和勻糝患處立刻生肌止血雖切斷亦接忌下生水金瘡並治端午日合更妙金瘡血出不止方七用紫黑降香節銼末微炒出汗五倍子打碎炒黃色各等分為細末糝之破傷手足方八用自己小便淋傷處雖痛甚立止外科膏子九治一切跌打損傷湯火傷爛將翎毛塗上即愈麻油八兩雞蛋黃一個頭髮三錢硃砂水飛銀硃各一錢水飛黃蠟六錢先將油入無硝硫砂鍋內文火煎後入蛋黃熬化盡再入頭髮剪寸長以箸順攪化盡始終文火順攪方入硃砂銀硃再入黃蠟掇鍋安地上一宿後收用從高墜下跌悶不醒方十甘松三奈白芷等分為末每服一錢二分滾水灌下立蘇接骨入骱方十一骨碎補川續斷威靈仙各一兩用陳酒二斤煎數沸濾清隨量熱飲之以盡醉為度並將藥渣搗爛尉揉傷處扎三日愈一緑散十二治打撲傷損眼泡赤腫疼痛芙蓉葉生地各等分共搗爛敷眼泡上或為末以雞蛋清調勻敷亦可七釐散十三治一切跌打傷損樹木山石傷折歸尾二兩兒茶六分硃砂乳香沒藥各二錢八分紅花雄黃各八錢冰片麝香各二分四釐血竭二錢四分各為極細末和勻以瓷瓶收貯每服七釐燒酒調百花酒送下並用酒調敷傷處參耆紫金丹十四此丹提補元氣健壯脾胃止渴生津增長精神和通筋血傷重而氣虛者最宜服之上黃耆炙黨參各四兩丁香當歸酒洗血竭骨碎補北五味各一兩五加皮沒藥去油各二兩甘草八錢茯苓一兩五錢煉蜜為丸每服三錢早晚淡黃酒化服童便亦可三黃寶蠟丸十五專治跌打損傷刀箭槍傷一切棒瘡破損風傷刑傷急血奔心及瘋犬毒蟲蛇咬墜馬瘀血凝滯痰迷心竅危在頃刻諸險症天竺黃天竺黃乃竹之精液結成如黃土著竹成片者是紅芽大戟劉寄奴血竭各三兩明雄黃兒茶各二兩當歸尾一兩三錢琥珀水粉麝香各三錢朴硝一兩藤黃四兩用秋露水隔水滾十數次去浮沉取中將山羊血拌入曬乾山羊血一兩研細入藤黃內上藥各為細末分兩要足如無真天竺黃即以九轉膽星三兩並醋炙瓦楞子一兩代之用提淨黃蠟二十四兩煉溶離火入滾湯內坐定將各藥末摻入不住手攪勻取起用瓷器盛貯聽用極危篤者一錢次者五分無灰黃酒化下外敷用香油隔湯燉化勿見火如受傷日久病勢深重速服數次能令周身瘀血盡變為新活絡舒筋真起死回生之聖藥也服後忌生冷瓜果燒酒一二日琥珀丸十六治跌打損傷五臟有瘀血在內不能飲食不大便者大黃酒炒桃仁去皮尖蘇木搗末薑黃各二兩朴硝檳榔黑醜半生半熟三稜酒煮香附赤芍各一兩巴豆肉炒紫色六錢紅花七錢肉桂烏藥各五錢木香三錢共為極細末將朴硝化水去渣麵糊為丸緑豆大硃砂為衣每服三錢大便行三次後吃冷粥即止內傷酒藥方十七治跌打及勞傷太過腹脅腰膝筋骨肢體疼痛無力不拘遠年近日男女老少皆效紅花桃仁炒秦艽續斷廣木香砂仁炒牡丹皮威靈仙各一兩當歸五加皮懷牛膝各三兩骨碎補捶碎忌鐵曬乾胡桃肉炒杜仲炒丹參各二兩擇道地藥制過曬乾用陳酒二十斤將一半同藥隔湯煮大線香三炷待冷定取開將所存之酒衝入封固每日早晚隨意溫服一二杯尉方十八凡跌打損傷不論新久先用此方尉傷處輕者不必再用藥重者先用此方再擦藥服藥更妙麵皮一斤做麵筋洗下者便是乾炒熱用紬包噴酒在紬上尉再噴再尉俟血脈行動再擦藥服藥則更效傷重者先服藥然後尉治打綿臀方十九以錫箔用無根井水濕過鋪杖處以手掌著力拍打即消一方用木耳四兩炒黃為末蜜調敷患上棒瘡膏二十用麻油四兩煎滾入雞子黃三個熬枯撈去再入洗淨血餘五錢又熬枯撈去下白蠟五錢冰片三分和勻冷透薄敷患處杖瘡方二十一杖畢即用童便陳酒各一鍾和勻溫服免血衝心甚妙即用蔥切爛炒熱搭杖處冷則再易止痛消腫散瘀神效跌打損傷此法亦妙如無蔥用熱豆腐敷在杖處其氣如蒸其腐即紫復易去以淡為度杖後敷藥方二十二樟冰七錢五分生大黃末七錢生半夏末三錢生豬油搗和攤草紙上貼之扎緊一宿用蔥椒湯洗夾棍傷方二十三急用熱童便一桶將足浸之如冷用燒紅磚二塊淬之即熱直浸至童便面上浮起白油其傷盡出再用肥皂搗如泥雞子清和敷傷處以草紙包裹腳縛緊一夜不可動內服人中白一兩煅乳香沒藥各二錢箬包炙牛膝三錢木耳五錢燒灰自然銅五錢煅共為末用牛膝一錢五分煎酒調下三錢內傷久發方二十四凡跌僕夯傷胸脅腰肋等處並肩挑負重失足蹬筋初時不覺延至經年纍月忽後疼痛浮面按之不痛撳重方覺或咳嗆吸氣牽掣吊疼此乃內傷氣逆血滯久恐患壅毒宜用生大黃細末一兩止可烘慎勿火炒以老薑二兩舂爛串滾水一杯絞汁隔湯頓溫調大黃末如膏藥黐式塗於痛處不必留頭蓋以粗紙外用帛扎之一日一換三次即愈如傷三五年者亦效
