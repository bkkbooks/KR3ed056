body:
  text: 卷三婦科門婦人之症與男子同而有不同者立天之道曰陰與陽立地之道曰柔與剛婦人之不同於男子者陰柔其性也人之一身氣運乎血血麗乎氣而婦人尤以血為先天之本血於婦人猶水之行地中自二七而天癸至榮華貫乎百脈而疾病亦莫不由之自行經而孕育而胎前而産後症有主有客而總以調和氣血為主氣血調經脈和腠理固病何從生體此以制方百不失一矣彼誤任攻伐者在柔脆之質為禍尤烈往往有陰罹其慘而不悟者良可哀也輯婦科益母丸一治婦人赤白帶下惡露淋漓不止及胎前産後諸症益母草方梗對節生葉葉類火麻四五月間開紫花是白花非於五月間採取曬乾連根莖葉勿犯鐵器磨為細末煉蜜丸如彈子大每服一丸用熱酒和童便化下若臨産時倉卒未合只用生益母草搗汁入蜜少許服之其效甚大或用砂鍋文武火熬成膏如黑砂糖色入瓷罐收貯每服二三匙或酒或童便調下亦妙歸神湯二治婦人夢交盜汗心神恍惚四肢乏力飲食少進諸症黨參二錢白朮一錢半白茯苓歸身各一錢炒棗仁陳皮各八分甘草五分圓眼肉七枚羚羊角琥珀各研末五分上羚羊角琥珀二味不煎余藥煎熟去渣入二末和勻食前服八珍養血丸三治月候不調赤白帶下皮寒骨熱肢體倦怠並一切崩淋乾血等症上炙耆大生地白朮丹參各三兩當歸陳阿膠茯神雲茯苓白芍各一兩五錢遠志八錢川芎一兩炙草五錢各取末杜仲十兩熬膏和煉蜜為丸每服四錢淡酒下如症勢重者早三錢薑湯下晚二錢淡酒下加味歸脾丸四治脾不統血以致妄行並心悸怔忡胃口不調飲食不香陰虛寒熱以及産後失調經行乖舛諸症黨參黃耆炙白朮炒雲苓炒棗仁各二兩遠志當歸各一兩廣木香煨炙草各五錢柴胡八錢麥冬一兩五錢去心糯米拌炒各取末用桂圓肉四兩煎汁小紅棗六兩去皮核煮爛和丸每服二錢早服鍋焦粉湯下晚服淡酒下一味生新飲五治乾血癆症全當歸五錢酒洗水酒各半濃煎分早晚服半月取效前症由於先天不足兼之七情所傷照方服加服養血丸見前三號兼進八珍湯見內症十三加陳阿膠二錢制杜仲一錢五分湯丸並進可以漸愈慎勿輕用通經逐瘀如桃仁代赭之類恐致崩下暈脫不可救藥也一味厭紅散六治血崩不止陳棕三錢燒灰存性陳酒調下前症由氣不攝血照方服加用補中湯見內症十號八珍湯見內症十三相間投之俱用陳棕灰五分為引兼服歸脾丸見前四號可以漸愈種玉酒七治婦女經水不調氣血乖和不能受孕或生過一胎停隔多年服此藥酒百日即能懷孕如氣血不足經滯痰凝者服至半年無不見效受胎後加服泰山磐石散見後二十號保護胎元全當歸五兩切片此能行血養血遠志肉五兩用甘草湯洗此能散血中之滯行氣消痰上二味用稀夏布袋盛之以甜三白酒十斤浸之七日為度每晚隨量溫飲之慎勿間斷服完照方再製再於每月經期加用青殼鴨蛋以針刺孔七個用蘄艾五分水一碗將蛋安於艾水碗內飯鍋上蒸熟食之多則五六個少則二三個尤妙蕎脂丸八凡閨女在室行經並無疼痛及出嫁後忽患痛經漸至滋蔓服藥罔效此乃少年新娘男女不知禁忌或經將來時或行經未淨遂爾交媾震動血海之絡損及衝任以致瘀滯凝結每致行經斷難流暢是以作疼名曰逆經痛患此難以受孕醫不明此猜寒猜熱論虛論實混治無效惟投以此方多神應痛止經調俱得産育蕎麥五升淘去灰曬燥磨節去粗皮取淨面聽用蕎麥補衝任脈絡且兼化瘀滯畫邊胭脂二兩此係蘇木茜草紅花佐以烏梅煎染綿繭而成取其溫潤之氣威而不猛上將畫邊胭脂煎濃汁搗和蕎麥淨面為丸如桐子大每早服五錢開水下忌食豬肝羊血糟醋一味利關散九治赤白沙淋諸症真赤茯苓五錢為末空心豆腐漿調下一味歸經飲十治月經逆上出於口鼻韭汁一小杯和童便溫服吐血咯血昏暈等症服此方亦能取效探胎飲十一婦人經水不來三月疑似用此驗之川芎不拘多少為末不見火空心煎艾湯調下五分覺腹中動則有胎也臍之下血動者乃血瘕也不動者血凝也病也泰山磐石散十二治婦人氣血兩虛或肥而不實或瘦而血熱或肝脾素虧怠惰少食屢有墮胎之患此方和平兼養脾胃氣血覺有熱者倍黃芩少用砂仁覺胃弱者多用砂仁少加黃芩更宜戒惱怒欲事屏酒醋辛熱之物可保無墮黨參焙糯米各三錢黃耆蜜炙川斷黃芩各一錢川芎甘草蜜炙砂仁研各五分白芍酒炒熟地各八分白朮土炒二錢白水煎服但常有孕隔三五日常用一服過四個月方保無虞其藥渣可傾入河池內與魚食之以有糯米故也千金保孕丸十三治妊婦腰背痛慣墮胎服此可免半産之患川續斷二兩酒拌炒厚杜仲四兩切片用白糯米炒斷絲上共為末以山藥四兩糊丸如桐子大每服八九十丸用米湯空心送下戒惱怒忌食酒醋豬肝發火等物徐東皋曰婦女凡懷胎兩三月慣會墮落名曰小産此由體弱氣血兩虛臟腑火多血分受熱所致醫家安胎又多用艾附砂仁熱補之劑是速其墮矣殊不知血氣清和無火煎爍則胎自安大抵氣虛則提攝不住血熱則濫溢妄行欲其不墮得乎香附雖云快氣開鬱多用則損正氣砂仁快脾多用亦耗真氣況香燥之性氣血兩傷求以安胎適以損胎也惟泰山磐石散千金保孕丸能奪化工之妙百發百中萬無一失護胎飲十四治經虛漏胎川芎六分歸身炒白芍雲苓各一錢上黨參蜜炙大生地炙各三錢焦白朮制杜仲川續斷各一錢五分炙草五分丹皮八分淮嶽二錢姜皮一分南棗二枚懷孕二三月忽然腹痛下血如欲小産照服一二劑可以固氣安胎縱然小産亦能平善勿易視之安胎飲十五妊娠五七個月用數服可保全産黨參白朮當歸熟地川芎白芍陳皮炙甘草紫蘇炙黃芩各一錢引加姜五分白水煎服銀苧酒十六治妊娠胎動欲墮腹痛不可忍及胎漏下血苧根二兩紋銀五兩酒一碗如無苧之處用茅草根五兩加水煎之如不善飲者水煎加酒飲之亦可益母地黃湯十七治妊娠跌墜腹痛下血黃耆炒生地益母草當歸各二錢引加姜二分白水煎服束胎丸十八懷胎七八個月恐胎氣展大難産用此扶母氣束兒胎自然易産然必胎氣強盛者乃可服條黃芩酒炒勿太熟冬月一兩夏月半兩白朮三兩陳皮二兩白茯苓七錢五分上為末粳米粥糊丸桐子大每服五十丸白湯下芎歸補中湯十九治氣血俱虛半産川芎炙黃耆當歸白朮炒黨參白芍炒炒杜仲炒阿膠各一錢艾葉二分五味子四分炒研炙甘草五分白水煎服保安煎二十治婦人難産橫生逆産以致六七日不下者或嬰兒已死腹中命在垂危照方服之立刻即下保全母子兩命服之無不效驗此方異人所授願以救世活人每見收生穩婆用手取割立傷産婦深可惻憫切忌切忌如臨月二三日前覺行走動履不安預服一劑可保萬全此方屢試屢驗活人無數矣當歸酒洗川芎各一錢五分厚朴薑汁炒蘄艾各七分菟絲子一錢四分川貝母一錢去心枳殼六分川羌活甘草各五分荊芥穗炙黃耆各八分炒白芍一錢二分冬日一錢水一鍾姜三片煎八分預服者空心服臨産者隨時服固元飲二十一治妊娠三月後胎動下血或因傾跌欲墮服此俱可保安大生地四錢川芎六分歸身川續斷雲苓各二錢炒白芍制杜仲丹參各一錢五分焦白朮一錢三分炙草四分煎成加淡酒半小杯沖服胎生者安如已死腹中方去川續斷加敗龜板三錢炙血餘灰五分芒硝六分投一劑自然收縮而下一味通瘀飲二十二治小産後惡露不行小腹脹痛等症丹參六錢酒浸一宿炒每取二錢煎成一小盞和入童便淡酒各半小杯更加薑汁一滴每早服一次三次為度凡小産重於大産尤宜加慎調養小産後照取陽和生化湯見後三十四號煎服一二劑兼進是方可免小産變生諸症疏解散二十三治妊娠傷寒初起項強惡寒肢冷骨節痠痛身體倦怠默默不語投是藥一劑肢體稍和得汗未透再一劑自然汗解解後無庸他藥服芎歸見前十九號八珍見內症十三等湯數劑可以保安如他症悉除惟余煩渴投加味逍遙散見內症二六二劑自愈川芎一錢全歸二錢建曲夏曲生黃耆各一錢五分砂仁四分枳殼炒防風各八分桂枝五分引煨姜一片蔥白三錢正氣飲二十四治妊娠瘧荊芥炒川芎各八分當歸建曲夏曲赤芍各一錢五分蒼朮炒白朮各二錢橘紅一錢赤首烏三錢枳殼六分炒藿香葉五分桂枝木四分尖引加姜皮二分蔥白三寸二劑後瘧發漸早漸輕去蔥白桂枝荊芥枳殼建曲夏曲加黨參大生地法制半夏各三錢柴胡六分炙甘草八分引去姜皮換姜一錢五分瘧先時服二劑應止如未止日進芎歸湯見前十九一劑瘧先時投五福飲見內症十七一劑自然漸止止後投八珍湯見內症十三數劑可以保安祛邪化滯煎二十五治妊娠痢川芎黃芩各八分當歸炒白朮各一錢五分建曲夏曲各二錢藿梗雲苓各一錢赤芍一錢二分煨木香四分炙草三分引加姜皮半分砂仁殼二分冬瓜皮五分投二劑化滯祛邪和調營衛痢應可止如未止用歸芍六君湯即前內症二二香砂六君湯去藿香砂仁換當歸白芍各一錢和入香連丸見內症五九一錢服三五劑自愈愈後加服八珍湯見內症十三數劑疏風利陰煎二十六治産婦中風不省人事口吐涎沫手足瘛瘲歸身四錢荊芥穗一錢五分上藥為末每服二錢水一盞酒童便各一小杯煎成灌之下咽即解萬應無憂散二十七胎前臨産之月間一日服一劑臨産時有力之家照方加好人參七分無力者加上炙黃耆二錢當歸身三錢焦術炒黃芩各一錢五分廣皮五分益母草大熟地各二錢大川芎茯苓塊各一錢炙草四分大腹皮八分黑豆汁洗淨紫氣丹二十八治橫生逆産難産者全當歸一兩川芎柞樹皮各五錢紅花二錢炙黃耆三錢敗龜板一個炙照分兩每料蜜成三丸每服一丸丹參二錢煎湯服若膏粱體弱甚加人參二錢藜藿體不加即産也佛手散二十九治懷孕六七個月因跌磕傷胎腹中疼痛口噤昏悶或心腹飽滿血上衝心及産後腹痛發熱頭疼諸症當歸五錢川芎三錢水一盞酒一小杯同煎照服一二劑胎生者安胎死者下如橫生倒産子死腹中者如黑馬料豆五錢炒焦乘熱淬入酒水中加童便一杯煎服當歸芍藥湯三十治妊娠心腹急痛或去血過多眩暈等症當歸白芍炒白朮炒茯苓澤瀉各一錢川芎二錢白水煎服加味芎歸湯三十一治分娩交骨不開或五七日不下垂死者生過男女婦人發三錢燒灰存性自死龜板一個炙酥用川芎七錢當歸一兩水煎服不問生死胎俱下仙傳通津救命至靈丹三十二治裂胞生及難産數日血水已乾産戶枯澀命在垂危者服之神效桂圓肉六兩去核生牛膝梢一兩用酒一杯浸搗爛將桂圓肉煎濃汁衝入牛膝酒內服之停半日即産平胃散三十三治胎死腹中其舌多見青黑口中甚穢而嘔腹中不動只覺陰冷重墜者是厚朴薑汁炒陳皮各三錢朴硝五錢炒甘草一錢二分蒼朮三錢米泔水浸去皮炒照方用河水一盞酒一盞煎十數沸入朴硝再煎數沸溫服其死胎即化水而出萬不失一一方用朴硝末三錢以熱酒和童便調服立下或用佛手散見前二九調服亦妙陽和生化湯三十四治産後惡露不行兒枕作痛並一切血暈諸症是方一産下即服之留渣再煎再服時不論冬夏人不論強弱俱宜照服切勿加減小産亦宜照服當歸五錢炙草五分炮姜四分川芎二錢丹參一錢五分桃仁九粒去皮尖煎好加花酒童便各半小杯沖服以杜産後諸患紫霞丹三十五治産後血暈驚風一切危症熟地川芎各四錢當歸八錢黑荊芥一錢炒炮姜五分丹參一錢五分桃仁五粒去皮研益母草一錢煎成加童便一杯和服一方治産後血崩大下不止用蒲黃炒黑為末二錢以川芎當歸各二錢煎湯調服一方治産後血不止用百草霜取燒野草者一錢酒調和入八珍湯見內症十三內溫服一方治産後昏暈急將亂髮浸陳醋燒於床前立蘇即取童便一碗溫服可保無虞養營惜紅煎三十六治産後鼻中流血不止歸尾三錢川芎一錢五分荊芥穗一錢炒黑血餘灰五分煎成加陳京墨酒磨汁半小杯童便一小杯和溫服一方用本人頂心發三五莖紅絨線三五莖合扎右手中指節上令極緊即止此乃瘀血逆行産後危症倉猝無醫速宜用此華他愈風散三十七治産後中風口噤手足抽掣角弓反張或血暈不省人事四肢強直或心頭倒築吐瀉欲死荊芥穗除根不用焙乾為末每服三錢童便調服口噤則挑牙灌之齦噤則不必研末只將荊芥用童便煎俟微溫灌入鼻中其效如神同黑豆酒並用更妙一方用黑豆五錢炒至煙起再入連根蔥頭五個同炒隨入好酒一杯水一盞煎成溫服出汗即愈邪滯雙解散三十八治産後瘧川芎六分當歸建曲夏曲炒蒼朮各一錢五分枯穀芽炒白芍藿香葉各一錢雲苓丹參各二錢大生地三錢炙引蔥八分煨黑姜一錢肢冷加桂枝尖木三分二劑後瘧來已正方內加升麻炙柴胡各四分生熟首烏各一錢五分投二劑可止如未止再投二劑接服休瘧飲見內症五四與八珍湯見內症十三相間服之可期漸愈快脾飲三十九治産後痢當歸建曲夏曲各一錢老蘇梗四分赤苓塊二錢丹皮八分藿梗六分淡乾薑二分炙草三分照服二劑加大生地一錢五分薑汁炒炭淮嶽二錢廣皮七分丹參二錢砂仁殼四分冬瓜皮八分白蔻肉四分大南棗二枚再四劑取和解而愈當歸補血湯四十産後大補陰血退血虛發熱如神黃耆一兩蜜炙當歸三錢水二碗煎一碗一服立愈分兩不可加減通脈湯四十一治乳少或無乳生黃耆一兩當歸白芷各五錢七孔豬蹄一對煮湯吹去浮油煎藥一大碗服之覆面睡即有乳或未效再一服無不通矣其新産無乳者不用豬蹄只用水酒各一盞煎服體壯者加好紅花五分以消惡露一方用雄豬白胰一個切碎炒半熟衝入黃酒一碗頓熱空心連胰服之兩三次效是方體壯者宜之一方用赤小豆四錢煎湯頻飲即通是方體弱者宜之吹乳飲四十二治乳癰初起蒲公英一兩金銀花藤二兩搗汁和熱酒服留渣敷患處開鬱流氣散四十三治乳硬如石槐花三錢炒遠志三錢上為末每日陳酒調服半月取效外用遠志蔥蜜餅敷之遠志蔥蜜餅敷法見外症六號益氣養營煎後引益血和中散四十四治乳岩乳癤初起用敗龜板煅存性每服三錢糖拌好酒送下盡醉即消托裡散四十五治乳癧潰爛至見臟腑雄鼠糞兩頭尖者是炒露蜂房煅土楝樹子經霜者炒川練不用上等分為末每服三錢酒下間三日一服數日膿盡瘡口漸收治妊娠小便不通腹脹如鼓數日垂死用豬脬吹脹以鵝毛管子安上插入陰孔捻脬氣吹入即通通後加服補中湯見前內症十一二劑治産後陰翻用澤蘭葉五錢煎濃湯熏洗即收治産後陰腫此症皆因下體受風形似生毒紅赤腫疼用蔥白一兩研膏入乳香一錢研勻敷貼患處即消一方用羌活防風各一兩煎湯熏下體亦消治子腸不收用萆麻仁十四粒研膏敷頭頂心腸收上即速去之去之不速恐生變異之症慎之慎之治産後肉線下垂此症因産婦用力太過垂出肉線痛徹心脾急搗連皮老薑三斤入麻油二斤炒乾先以熟絹盛起肉線納入産戶乃以絹袋盛姜就近熏之冷則更換漸次縮入重者須一二日可愈斷則不治治乳脹不回用大麥芽炒黃煎服神效治乳懸怪症産後兩乳忽長細小如腸垂過小腹痛不可忍用川芎當歸各二錢濃煎頻服仍用二味燒熏令病者吸之又以萆麻子一粒研爛貼其頭頂當漸收上既收復舊速即洗去萆麻子附録達生論臨産六字真言一曰睡二曰忍痛三曰慢臨盆初覺腹痛先自家拿穩主意要曉得此是人生必然之理極容易之事不必驚慌但看痛一陳不了又疼連連五七陳漸疼漸緊此是要生方可與人說知以便伺候若痛得慢則是試痛只管安眠穩食不可亂動此處極要著意留心乃是第一關頭不可忽略若認作正産胡亂臨盆則錯到底矣此時第一忍疼為主不問是試痛是生産忍住疼照常吃飯睡覺痛得極熟自然易生且試痛與正産亦要疼久看其緊慢方辨得清千萬不可輕易臨盆坐草揉腰擦肚至囑至囑再踮時宜穩踮坐時宜正坐不可將身左右擺扭須知此處要自家作主他人替不得與自家性命相關與別人毫無干涉到此時必要養神惜力為主能上床安睡閉目養神最好若不能睡暫時起來或扶人緩行或扶桌站立片時疼若稍緩又上床睡總以睡為第一妙法但宜仰睡使腹中寬舒小兒易於轉動且大人睡下小兒亦是睡下轉身便不費力蓋大人宜惜力小兒亦惜力以待臨時用之切記切記無論遲早切不可輕易臨盆用力切不可聽穩婆說孩兒頭已在此以致臨盆早了誤盡大事蓋母子一氣子在母腹中時母之氣力即子之氣力母若無力則子亦無力矣故母不輕用力兒便有氣勢自會鑽出何須著急因恐小兒力薄其轉身時用力已盡及到産門不能得出或亦有之宜稍用力一陳助之則脫然而下矣或曰大便時亦須用力如何生産不用力不知大便呆物必須人力小兒自會轉動必要待其自轉不但不必用力正切忌用力蓋小兒端坐腹中及至生時垂頭轉身向下腹中窄狹他人有力難助要聽其自家慢慢轉身到産門頭向下腳向上倒懸而出若小兒未曾轉身用力一逼則腳先出以為詫異且贈之美名曰腳踏蓮花生或轉身未定時用力一逼則橫臥腹中一手先出又名之曰討鹽生即或轉身向下略不條直用力略早亦或左或右偏頂腿骨而不得出不知此等弊病皆是時候未到妄自用力之故奉勸世人萬萬不可用力然亦非全不用力但當用力只一盞茶時耳其餘皆不可亂動者也即如大便未到其時縱用力亦不能出而況於人乎或問何以知此一盞茶時而用力乎曰此時自是不同若小兒果然逼到産門則渾身骨節疏解胸前陷下腰腹重墜異常大小便一時俱急目中金花爆濺真其時矣當於此時臨盆用力一陳母子分張何難之有更有第一妙法凡女子臨産其兩手中指傍脈必跳動異於往時直至中指第二節脈亦亂動方是的真時候於此時臨盆則用一口氣送下便生矣或曰早一時斷乎不可矣不知遲了一時可不妨否曰不妨若果當其時必無不出之理然或偶有不出者則小兒力盡不能得出宜令上床安睡使小兒在腹中亦安睡歇力少刻自然生矣或曰倘或兒到産門而大人睡下豈不有礙曰更好蓋小兒向下時而大人坐立則小兒倒懸矣豈能久待今大人睡下兒亦睡下有何妨礙又曰倘或悶壞奈何曰他十個月不曾悶今乃悶乎或曰不宜用力已聞教矣不知先誤用力以致橫生倒産有法治之否曰急令安睡用大劑加味芎歸湯服之將手足緩緩托入再睡一夜自然生矣又曰托之不入奈何曰若肯睡再無托不入之理若到此時仍不許他睡又或動手動腳亂吃方藥吾末如之何矣若兒身已順産戶已開兒已露頂猶不下者此因兒身回轉臍帶絆肩故也名曰礙産即令産母仰臥徐推兒上以中指按摩兒肩去其臍帶方可用力或曰盤腸生是何緣故曰用力之過蓋因産母平日氣虛及到臨時用力努掙渾身氣血下注以致腸隨兒下一次如是下次路熟又復如此若能等待瓜熟蒂落之時何得有此怪異或曰穩婆不必用乎曰既有此輩亦不能不用但要我用他不可他用我全憑自家作主不可聽命於彼耳大約此等人多愚蠢不明道理一進門來不問遲早不問生熟便令坐草用力一定說兒頭已在此或令揉腸擦肚或手入産門探摸多致損傷更有一等狡惡之婦藉此居奇射利禍不忍言矣每見富貴之家預將穩婆留在家中及到臨時稍不快利前後門戶接到無數紛紛攘攘吵成一片所謂天下本無事庸人自擾之但房中只要曾生育過老嫗二人有氣力抱腰女人二名或一人靜以守之米粥時進以飽為度或問服藥有益無損否曰安得無損鼠兔二丸大耗氣而兼損血回生丹大破血而兼損氣蓋鼠兔例用香竄之藥産時百脈解散氣血虧虛服此散氣藥兒已出而香未消其損多矣且令毛竅開張招風入內禍不可言回生丹以大黃紅花為君其餘亦多消導之品血已耗而又大破之多致産後發熱等病遺患無窮按此方藥古今稱為神靈奇寶尚然如此其他可知今所輯胎産前後諸方皆家常之品屢經試驗者非世上之方故公之人世以廣大生之德或曰依此言世間總無難産者耶曰偶亦有之或因母太虛胎養不足血氣不完或母病傷寒之後熱毒傷胎又或夫婦同房太多以致欲火傷胎平日過食椒姜煎炒之物火毒傷胎以及跌撲損傷皆致難産多令胎死腹中除此之外無難産者矣又有嚴寒天氣滴水成冰之時貧家房中火氣微薄以致血寒而凍亦令不出然此亦因臨盆早去衣久坐之故耳若令擁被安臥待時而産豈有此患或問臨産時飲食如何曰此時心內憂疑腹中疼痛甚至精神疲困口中失味全要好飲食調理但不宜過於肥膩耳倘不能食只將雞鴨湯肉湯之類吹去油澄清頻頻飲之若在貧家豈能辦此白米粥最佳餛飩亦可俱能壯助精神和調氣血人以食為命豈可一日缺乎冬月天冷産母經血得冷則凝致兒不能下此害最深故冬月生産下部不可脫去棉衣並不可坐臥寒處務使滿房圍爐常有暖氣令産母背身向火臍下腿膝間常暖血得暖則行兒易産也盛夏産婦宜溫涼得宜不可過涼致增疾病不可人多熱氣逼襲令産母心煩熱血沸騰有鬱冒沖暈之患將産最戒曲身眠臥雖甚腹痛宜強為踮立散步房中或憑几立切戒曲腰以阻兒轉舒尋路也蓋兒子尋到産門被母腰曲遮蔽再轉又再蔽則子必無力而不能動決至難産人見其不動則謂胎死其實因無力而非死也此時縱有妙藥良方不能令子有力而動只要補接産母元氣更要心安氣和調理精神胎元漸復可保無虞又有胞水以下子忽不動停一二日三五日者調補氣血之外切戒憂懼驚恐暴躁蓋驚則神散憂則氣結暴則氣不順血必妄行多致昏悶知此善調自然無恙凡手先出名曰橫生足先出名曰倒生救法急令産母仰臥略以鹽塗兒手心足心仍以香油抹之輕輕送入即便自轉順生不可任其久出久則手足青而子傷難以送入亦不可妄用催生方藥蓋手足之出非藥可治又切勿誤聽凶婦用刀斷手一斷子必腹中亂攪而傷母矣或問試痛何故曰兒到七八個月手足五官全備已能動彈或母腹中有火或起居不時令兒不安以此大動而痛此等十胎而五不足為奇只宜照常穩食安眠一二日自然安靜或痛之不止用安胎藥一二服自止此後近有數日遠則月餘甚至再過三四個月才産人多不知輕易臨盆終日坐立不令睡倒或抱腰擦肚或用手拖或用藥打生生將兒取出母則九死一生兒則十胎九夭慘不可言世間難産皆此故也蓋胎養不足氣血不全如剖卵出雛裂繭出蛹寧可活乎只說小兒難養誰復根究到此又有受寒及傷食腹痛不可不知或問何以知其試痛曰只看痛法一陳緊一陳者正生也一陳慢一陳或乍緊乍慢者皆試痛也或問傷食受寒何以辨之曰傷食者當臍而痛手按之更痛或臍旁有一梗寒痛多在臍下綿綿而痛不增不減得熱物而稍緩是也或問將試痛認作正生其害如此倘將正生認作試痛以致過時不亦有害乎曰無害果當其時小兒自會鑽出縱或過時不過落在褲中生在床上而已有何大害而如此諄諄乎大全方曰婦人懷孕有七八個月生者有一年二年乃至四年而後生者不可不知朱丹溪先生云産後以大補氣血為主雖有他症以末治之陳無擇曰兒下時切不可遽然平臥必須靠坐良久俟惡露下行方可安臥不然恐血隨火上行奔心入肺以成危症又若分娩艱難勞傷元氣産母垂危産子已死急以黃耆川芎當歸數斤水煎乘熱熏蒸滿室俾産婦口鼻俱受其氣臍帶以油紙燃燒斷藉其暖氣以接補子母陽氣枕流子曰交骨不開多因用力太早逼兒頭在戶口也但數日不下者服藥後閉目靜養片時則藥入陰分藥始奏功不然無效蓋開目則氣行陽道閉目則氣行陰道夜雖屬陰不閉目則尚在陽晝雖屬陽一閉目則氣亦入陰矣保胎以絶欲為第一義其次亦宜節欲蓋寡欲則心清胎氣寧謐不特安胎且易生易育少病而多壽孕已知覺即宜用布一幅六七寸闊長視人肥瘦約纏兩道橫束腰間直至臨盆之時才解去若是試疼仍不宜解蓋胎未長成得此則腰膂有力些須閃挫不致動胎且常令腹中狹窄及到解開則腹中乍寬轉身容易凡覺受胎一切行動俱宜小心不可任意舉步及用力移掇重物恐防蹉跌五月以前根蒂未固若一遭跌多有墮落之虞五月後至臨産小兒神識初生魂魄怯弱母若一跌兒在腹中如山崩地陷神魂飛越無論胎墮子母不保幸而生育必有胎驚臍風之病多致夭折萬一成人恆遭顛癇惡疾藥不能療與其生後疼愛不若胎中保護慎之慎之一受胎後不可登高上梯恐傾跌有損不可伸手高處取物恐胎傷而子啼腹中如子腹中啼但令妊婦鞠躬片時或俯拾地上錢豆之類自安生男生女夫命所招與婦何干倘或連胎生女不可在旁咨嗟嘆息令其氣苦致病傷生凡此只宜寬慰為主又有將女溺死者忍心害理後嗣不昌産後莫妙於熱酒對童便或腹痛甚用陽和生化湯無不愈者再用馬料豆炒至煙出用無灰酒淬之如此三次去豆飲酒能治産後七十二症傷風受寒者尤宜或問産後胞衣不下乃極惡之症可以損命有諸曰不妨不必服藥亦不必驚恐若胞衣不下急用粗麻線將臍帶繫住又將臍帶雙摺再系一道以微物墜住再將臍帶剪斷過三五日自痿縮干小而下纍用有驗或以二指隨臍帶而上帶盡處以指連胞向下一捺惡血覆盡其衣隨手下矣或覺胎衣不下産婦用自己頭髮塞口中打一噁心則下矣只要與産母說知放心不必驚恐不可聽穩婆妄用手取多有因此而傷生者慎之慎之小産重於大産一切調理並如産後法薛立齊先生云小産重於大産大産如粟熟自脫小産如生採破其皮殼斷其根蒂也但人往往輕視死者多矣小産數日後忽然渾身大熱面紅眼赤口大渴欲飲涼水晝夜不息此血虛之症宜用當歸補血湯以補其血若認作傷寒而用石膏芩連等寒涼之藥則必死矣
