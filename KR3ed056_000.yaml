body:
  text: 弁言難經云望而知之謂之神聞而知之謂之聖神聖之精意不可得而傳矣然醫之道備乎陰陽氣化盡物性以盡人性而顯著者則在方書慨自青囊未傳肘後未得而古方之流播於世者亦皆難闡其精焉而莫謂無精之可闡也且夫上藥養命中藥養性下藥治病治病之藥苟不通性命之故則病亦安可治哉然則病之治治以方而養命養性所謂方之精也嗟乎靈樞素問非不載籍極博而為人所樂稱第恐得其粗而遺其精而古人之良法美意不能面稽於千百載以上則亦如廣陵散之絕而不彈已惟能得乎其精則方之極奇闢者固以精而得精方之極平淡者更以不精而得精況由參考諸方推求善本是又合古人之精而得精並精古人之精而為精此所謂匯精也昔孫思邈有千金翼方陶宏景有集驗五卷皆流傳後世獲濟甚多施藥之功又不若刊方流濟之功為最大是編顏之曰匯精即謂孫氏之千金陶氏之集驗也可愛虛老人序嘉慶九年歲次甲子三月京江尊仁堂刊送凡例一古今方書汗牛充棟經驗方本刊刻亦多茲於各方本擇其屢效屢驗者分內外婦兒四門又附奇急一門共五卷名曰古方匯精付之棗梨公諸當世掛漏之譏固所不免一內外諸方婦兒通用其有專屬婦兒者列為專門至婦人胎產小兒初生尤為緊要特採錄達生論變蒸考於後一奇急一門症非常見倉猝奇險遲則難救故遍採諸方以盡周急之義一望聞問切缺一不可是編於各方下詳列形症不及脈理蓋脈理難言而形症易曉有諸內形諸外按症求治斯為得之一古今元氣不同醫宗各家詳言之矣茲所輯方總以固養元氣為主其症因客感治宜攻散者亦惟中病而止無敢過任克伐致傷元氣每門各輯小引略陳要言閱者幸無忽視一是編所錄之方俱系參考諸書擇其善本詳加校訂以免訛錯採用者切勿妄議加減一編內如六味八珍補中歸脾等方習見諸書原無庸載茲因治症需用極多查閱他本一時未便故備載之一是編分定目錄編定號數其有一方兼治數症一症參用數方者各於湯引下註明見前見後某門某類某號以便查閱惟奇急一門有形症無名目未列號數一是編簡冊無多俱系經驗或村居僻處醫遠難求或客旅舟車便於攜帶尤為得濟刊布流傳功莫大焉一編內除煎劑各方臨症取用其餘各門類膏丹丸散有一方兼治眾症費少功多者有藥難猝辦必須預為修制者如能照方預擇道地藥材制好收貯隨時見症施治利濟無窮
