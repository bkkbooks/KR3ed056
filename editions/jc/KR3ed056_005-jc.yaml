body:
  text: 卷五奇急門奇急者何凡症必審色脈察表裡而倉猝中不及審察莫知何經莫名何症所以奇所以急也不速救即至不救故於內外婦兒後備列急救諸方症雖奇而方實庸也而效自奇也勿以庸視之輯奇急一救自縊徐徐抱住解下不得用刀剪斷繩上下安被放倒微微捻正喉嚨以手掩其口鼻勿令透氣一人以腳踏其兩肩以手挽其頂發常令弦急勿使縱一人以手摩捋其胸臆屈伸其手足若已僵直漸漸強屈之一人以腳裹布抵其糞門勿令泄氣又以竹管吹其兩耳用生半夏末吹鼻中男用雄雞女用雌雞刺冠血滴入口中切不可用茶灌候氣從口出呼吸眼開仍引按不住須臾以薑湯或清粥灌令喉潤漸漸能動乃止此法自旦至暮雖已冷可活自暮至旦陰氣盛為難救心下微溫者雖一日以上亦可活百發百中一救溺死先以刀斡開溺者口橫放箸一隻令其牙銜之使可出水又令一健夫屈溺人兩足著肩上以背相貼倒駝之而行令出其水仍先取燥土或壁土置地上將溺者仰臥其上更以土覆之止露口眼自然水氣吸入土中其人即蘇仍急用竹管各於口耳鼻臍糞門內更迭吹之令上下相通又用生半夏末搐其鼻用皂角末綿裹塞糞門須臾出水即活一救凍死及冬月落水微有氣者脫去濕衣隨解活人熱衣包暖用米炒熱囊盛熨心上冷即換之或炒灶灰亦可再用雄黃焰硝各等分為末點兩眼角候身溫暖目開氣回後以溫酒或薑湯粥飲灌之若先將火炙必死一救壓死及墜跌死心頭溫者急扶坐起將手提其發用生半夏末吹入鼻內少蘇以生薑汁同香油攪勻灌之次取小便灌之再取東向桃柳枝各七寸煎湯灌下一救中惡魘死不得近前呼叫但唾其面不醒即咬腳跟及拇指略移動臥處徐徐喚之原無燈不可用燈照待少蘇以皂角末吹鼻取嚏一方凡溺縊魘死急取韭菜搗汁灌鼻中得皂角末麝香同灌更捷一救自刎斷喉自刎者乃迅速之變須早救之遲則額冷氣絕不救矣初刎時急用油線縫合刀口即取桃花散摻之方見後多摻為要急以綿紙四五層蓋刀口藥上以女人舊腳帶將額抬起周圍纏繞五六轉扎之患者仰臥以高枕枕在腦後使項鬱而不直刀口不開冬夏避風衣被覆暖待患者氣從口鼻出以姜五片人參二錢川米一合煎湯或稀粥每日隨便食之三日後急解去前藥用桃花散摻刀口上仍急纏扎扎二日急用濃蔥湯軟絹蘸洗傷處挹干用方𠂉再子腳挑玉紅膏方見外科三三放手心上捺化捺傷口再用舊棉花薄片蓋之外用長黑膏貼裹周圍交扎不脫近喉刀口兩旁再用膏藥長四寸闊二寸豎貼兩頭黏貼好肉庶不脫落外再用絹帶圍裹三轉針線縫頭冬月三日夏月二日用蔥湯洗挹換藥自然再不疼痛其肉漸從兩頭長合內服八珍湯方見內症十三調理月餘如大便結燥用豬膽套法不可以利藥利之雙顙俱斷者百日單斷者四十日收功附桃花散方多年陳石灰三兩大黃一兩五錢切片上同炒至石灰紅色去大黃研極細備用中暑昏眩煩悶欲絕方取陰涼道上乾土做一圈圍在病人臍外使少壯撒尿於內片時即醒醒後不可進冷湯須進溫米湯一方掘地深三尺取新汲水傾入攪濁名地漿飲數甌即解並解一切惡毒中寒厥冷僵仆方急以繩束蔥二斤切去兩頭如餅式火上燒熱安臍下上用火熨之即蘇或米或灶灰炒熱布包熨並效刮痧方用青銅大錢一個系絨線另碗盛豆油及真燒酒和勻將錢蘸油酒刮手足骨節彎脈門前後心腦後共九處每處刮七七之數視其現有紫泡或紫色斑點用銀針刺去惡血即蘇但刮時必須避風恐更襲外邪變生他症慎之慎之一方治痧脹用礬和開水溫飲或灌下取吐瀉而愈羊毛疹方是症所以異於痧脹者惟於眼角辨之痧脹目珠青色羊毛疹多黃色痧脹指甲多青白色羊毛疹指甲多紫色用燒酒摶黃土慢揉胸腹臍口加用百沸湯和地漿候溫灌下可解五竅出血方凡耳目口鼻一齊出血名曰上虛下竭死在須臾不及用藥先將冷水當面噀幾口如系婦人急分開頭髮以水噀之男子無發可分用粗紙數層冷醋浸透搭在囟門其血即止隨用炙黃耆一兩當歸三錢沉香五分加童便半小杯和服血自歸經再用調補走精黃病方是症面目俱黃多睡舌紫甚而裂若爪甲黑者死淡豆豉五錢牛膝一兩煎汁以帛蘸擦舌去黑皮一層再濃煎豉湯飲之卒然肚黑方凡大人小兒其肚皮驟然青黑色人事昏迷此乃血氣失養風寒乘之所變怪形真危惡之敗症也急用大青烘燥研細末大青多生溪溝旁葉似火麻葉草藥店多有之又有小青葉細性味相同功效稍緩每服一錢五分以好酒調下黑退即愈否則終危此起死回生之方也治截腸方大腸頭拖出寸余痛苦之極直候乾自退落又拖出名為截腸病若腸盡則不治但初截寸余可治用芝麻油以器盛之以臀坐之再用天麻子五錢煎汁溫飲或用生木耳槐花各等分加冰片少許研細用麻油調搽臂竅出血方炒甲片研末罨之鷺鷥瘟方兩腮腫脹憎寒惡熱者是外用赤豆半升為末水調敷或搗側柏葉敷薄荷煎濃湯熱服解毒散解一切毒並蛇虎瘋犬咬等傷毒氣內攻眼黑口噤足僵目直勢在垂危等症明礬一兩甘草一兩共為末每服二錢開水送下並外擦患處有起死回生之功瘋犬咬傷方咬傷額角及人中虎口不治七八歲者不治男三十日後不治女二十七日後不治上部難治下部易治天南星取白而光者防風各切碎炒研等分和勻每服三錢日二服若到第七日毒氣已聚腹中於半飢時以滾水拌藥陳酒送下微醉臥床出汗大便中放出血塊而愈外用溫茶洗杏仁不拘分兩去皮尖同黃砂糖搗敷要禁止色欲忌食牛羊豬雞魚蝦海味生冷油膩麵食燒酒赤豆蠶豆角豆茅筍香菌茄子蔥蒜辛辣一切發風動氣之物及鑼鼓聲以百二十日為度若犯前禁復發無救慎之慎之凡瘋犬咬傷最怕七日一發發時形狀天本無風病者但覺風大要入幔矇頭躲避此非吉兆過三七之日無此畏風情形方為可治如被咬時即至無風處以小便洗淨齒垢敷以杏仁泥當即服韭菜汁一碗隔七日再服一碗於四十九日內共服七碗凡春末夏初適犬發狂人被咬者無出上法更須忌鹽醋百二十日一年內須忌豬肉魚腥終身忌狗肉蠶蛹方得保全否則十有九死如誤服斑蝥以致小便疼痛急用涼水調六一散見幼科二三錢服之二三次痛止一治毛竅節次出血少間不出即皮脹如臌口鼻眼目俱脹合病名脈溢用生薑汁二大匙加北五味子三錢當歸一錢五分水煎服立瘥一治遍身忽肉出如錐既癢且痛不能飲食此名血擁若不早治潰而膿出以蔥管青皮煎湯淋洗再用豆豉五錢煎湯頻飲即瘥一治身上及頭面上浮腫如蛇伏狀者用雨滴磉階上苔痕水化噙之蛇形立消一治腰間忽起紅泡名白蛇纏腰若不早治被其纏到不救急用蛇殼一條燒灰存性廁坑板上浮泥刮下同研細童便調敷數次即愈一治眼見諸般飛禽走獸以手撲捉則無乃肝膽邪火為患以棗仁羌活元明粉青葙子花各一兩共為末每服二兩水一碗煎至七分和渣飲之一日三服愈一治鼻中毛晝夜可長一二寸漸漸粗圓如繩痛不可忍雖忍痛摘去一莖後即更生此因食豬血過多所致用乳香燈草拌炒硇砂研末各一兩以飯為丸如桐子大臨睡時開水送下十粒自然脫落一人忽然手足心齊凸腫硬此心脾腎三經冷熱不和所致以花椒鹽醋敷之即愈一手十指節斷壞惟有筋連皮內蟲行如燈心長數尺遍身綠毛名曰血餘以茯苓五錢胡黃連一錢煎飲之自愈一凡指爪抓傷面目以橄欖核磨水搽之過宿則無痕跡一人咬傷痛用荔枝核焙研篩細糝之外用荔肉蓋貼雖落水亦不爛神效再用青州柿餅一個令人漱口潔淨將餅咀爛盛淨瓷器內飯鍋上再蒸極爛敷患處三日全愈一咬破牙黃入內必至糜爛急用人尿浸二三時洗出牙黃再照前方敷糝神效一咬傷指頭久則手指脫爛急用熱尿入瓶將指浸之一夕即愈如爛用夾蛇龜殼燒灰敷之一誤斷指頭用降香細末糝之包以絲棉七日不可落水冒風不必再換一次即痊一箭頭針刺入肉不出用蓖麻子去殼搗爛敷之癢即出又方用巴豆仁略炙與蜣螂同研塗之痛定覺微癢待癢不可忍便搖動拔出以定痛生肌散見跌打損傷類四敷之一竹木瓦刺入肉內不出者用煨鹿角末以水調敷之立出久者不過一夕即出又方用大活蝦七個搗爛塗之一時刺隨蝦出一鬼箭打用山梔七個炒桃頭七個面炒共捍餅貼患上次日取下作七丸投炭火燒響即愈一重物壓打青腫紫赤血痕疼痛用蘇木煎汁磨真降香塗之不可落水連搽數日其腫消散即愈此藥軍中宜多備以治刀斧損傷大妙一湯炮火燒用蚶子殼煅研細末配冰片少許如濕處燥敷干處麻油調搽數次收功真神方也蚶子殼一名瓦楞子一湯燙火燒油烙用雞子清磨上好京墨塗患處上用三層濕紙蓋之則不起泡覺冷如冰水極妙一燙火傷用醋調黃土敷之效一熱酒燙用陳米炒焦為末黑糖調敷立效一銃子入肉用蜂蜜不拘多少沖好酒飲醉即出如無用黃蠟亦可一方用舊銷銀罐同水銀研入患處其鉛即化隨水銀出一誤吞金器胸膈痛不可忍以羊頸骨煅末每服三錢米飲下過夜其器即隨大便取下此格物之妙方也一誤吞金銀用真輕粉五錢研細末水調下能令金銀從大便出一誤吞鐵物用燒櫪炭帶紅研細以砂糖調服二三錢立愈一誤吞銅物及銅錢多食荸薺核桃自能消化一誤吞針用米飲調炭末三錢一誤吞木屑搶喉不下用鐵斧磨水灌下效一碗爿入腹用羊腳骨五錢炙灰研細置土地下冷透開水送下一瓷鋒嵌腳用三角白果去殼衣心不拘多少浸菜油內用時搗餅貼之再易而愈如多年爛者敷之易痊初爛者以生白果肉捶爛罨傷處亦愈一骨鯁用烏梅肉五倍子各等分搗爛為丸彈子大每服一丸含口內其骨自化一骨鯁在咽痛不可忍不能飲食垂危者用栗子著肉衣五錢研乳香二錢研鮎魚肝一個搗和為丸綠豆大以線一根黏線頭於丸內患者將丸墜至喉間含片刻引之其骨自出一諸般骨鯁用象牙屑以新汲水一盞浮牙屑水上吸之骨自下一天絲入目用木梳垢不拘分兩為一丸放眼角邊即出或刺手指血塗眼內將燈草在眼睛上輕輕卷之即有血筋纏燈草上須再塗再卷卷盡血筋即能止痛一雞冠子落眼中急仰臥研濃墨滴眼中須臾隨墨水眼淚流出一毒蛇咬先吃麻油二碗令毒氣不隨血走然後用土貝母五錢為末酒調服令患者盡醉少時酒化為水從傷處流出候水流盡將貝母渣敷瘡口雖傷重垂死服之可活又方用鳳仙花一株連根葉入獨囊大蒜一個又入人涎唾同搗爛空傷口圍之毒水立時吊出即愈一被虎咬抓傷以蠶豆葉搗敷如無葉時以枯蠶豆水浸軟連皮搗敷亦妙一猢猻抓傷潰爛以金毛狗脊焙研末摻之或麻油調搽立愈一馬咬傷潰腐以馬齒莧一握煎湯日日服之以愈為度瘡口以打馬鞭子或籠頭索燒灰摻之即愈其毒入心者此二方亦效一豬咬潰爛以龜板炙研細麻油調搽立愈一貓咬或抓傷以薄荷搗汁或研末搽糝漸愈一鼠咬用吳萸擦貓鼻取涎塗之或以貓毛燒灰香油調搽愈一蜈蚣咬用雞冠血塗之或用一大蜘蛛置患處自吮其毒又方用生甘草末生蜜調搽或用傘紙燒煙熏患處並效一諸蟲咬用生甘草末生蜜調搽立效一蠍子傷用杏仁七粒蔥白三寸搗爛津唾調敷立愈一蠍子螫用蝸牛即蜒蚰蟲搗塗或用生半夏水磨敷俱效一蜈蜂叮刺宜急口嚼栗子敷之或用生芋艿或芋梗葉擦之立能止痛一壁鏡咬毒人多死以桑柴灰水煎三四滾濾汁調白礬敷之立瘥一蜴𧌐俗名揚辣子刺人毛飛入肉作痛先以水塗患處隨用馬齒莧搗爛敷之一二次即愈或以熟蜜搽之亦效一壁虎入耳以雞冠血滴耳內即出一壁虎咬用大黃醋磨搽一臭蟲入耳以鱉甲燒煙燻耳其蟲立死無害過後可服菊花湯兩三日以杜火氣之患一諸蟲入耳用皂角末吹入耳中或以菜油滴耳內並效一中蜘蛛毒遍身發腫飲靛青汁即解將蜘蛛投入靛汁即化為水一中天蛇毒天蛇即草間黃花蜘蛛是或遭其毒又為露水所濡因至通身潰爛號呼欲絕有腫起處以鉗拔之如蛇凡取十餘條而病不起用秦皮煮法飲之日服五七次多服乃效服之三日愈一受蚯蚓毒形如麻風鬚眉脫落或夜間被內作鳴急用鹽湯或石灰湯淨洗若小兒受之則卵腫用鹽湯洗以鴨血塗之或用火筒吹腫處皆驗一蠶齧人毒入肉中令人發寒熱以苧麻葉搗汁塗之一諸色惡蟲咬傷用薑汁先洗患處再用明礬雄黃為末擦之一中諸毒凡覺中毒即以生豆試之不聞腥氣即是一解砒毒用綠豆粉四兩黃泥四兩篩淨將兩味研極細用雞子清調勻仍用綠豆泡水煎湯和服以醒為度一服砒未久者取雞蛋二十個打入碗內攪勻入明礬末三錢灌之吐則再灌吐盡便解如服久者不能吐出急用黑鉛四兩重一塊用井水於石上磨汁旋磨旋灌灌盡則愈即先吐出亦宜以鉛汁解其餘毒又方以熱鴨血灌或糞清灌或甘草汁藍汁灌或用白蠟末三錢調雞子清三五枚灌俱效又方倉猝間急以清油多灌之又方用荊芥四兩煎濃湯服下即愈一中水銀毒飲以地漿水立愈一中鉛粉毒以砂糖調水服或搗蘿蔔汁飲之一中輕粉毒有至角弓反張者用生扁豆水浸一時漉起搗取汁和地漿飲之即愈一誤食銀硝漸爛腸胃延日垂死用飴糖四兩熬作丸不時以麻油送下服完再合須至百日無患一解鹽滷毒用生豆腐漿灌之再以鵝翎絞喉探吐即活又方急灌米泔水幾碗或生黃豆漿亦可勢垂危者以活雞或鴨兩三隻斷去頭塞於口中以熱血灌下可解一誤食桐油嘔泄不止急飲熱酒即解一燒酒毒用白蘿蔔汁或熱尿灌之或用錫蓋氣水一杯灌下即解一燒酒醉死急用生蚌瀝水灌之或取井底泥罨心胸或以新布蘸浸新汲水罨之熱則再易一中面毒飲生蘿蔔汁即解一中花椒毒氣悶欲絕者以地漿水解之一過食白果多成風醉用白鯗頭煎湯服一二次愈一中野蕈毒急取鮮銀花藤葉搗取汁生飲如無鮮銀花取乾者煎濃汁飲之如誤食楓樹上蕈令人笑不止以地漿解之一中鉤吻毒鉤吻生池旁似芹菜惟莖有毛以此別之俗名毛腳鴨兒芹中其毒者用桔梗八兩水六升煮取二升分兩次溫服即解一中半夏毒滿口疼痛火熱飲食難下諸醫不效用老生薑汁半杯忍疼呷下候片刻辣性已過其毒即解一中巴豆毒症見口乾面赤五心煩熱下利不止用綠豆煎湯冷服即愈或芭蕉根葉搗汁飲之利止而安或用大豆一升煮汁飲亦可一中附子毒飲生綠豆汁或用田螺搗碎調水服即解一誤食木鱉子發抖欲死急用香油一盞和白糖一兩灌之一中斷腸草毒服熱羊血碗許總宜吐盡為妙又方用生雞子二三枚吞下急以升麻湯灌吐即效一凡人家園圃豢養仙鶴其鶴或傍樹枝或臥叢草將頭搔癢遺有頂毒黏在樹草間人或不知適以手摸腳踏立時赤腫疼痛異常急以青松毛和糯米飯同搗敷之立瘥一中斑蝥毒腹痛嘔吐煩躁欲死以生雞子清三四枚灌下一解諸藥毒用蠶蛻紙燒灰研細每以一錢冷水調下少頃再服雖面青脈絕腹脹吐血服之立效亦治牛馬誤食蜘蛛腹脹欲死一百毒所中用綠豆甘草等分水煎服可解一驗下蠱中毒令病人含一黑大豆豆脹皮脫者是凡嚼黑大豆不腥白礬味甘皆中毒也濃煎石榴皮根飲之吐出活蟲即解一中牛肉毒用烏柏樹根皮酒煎服或野菊花連根搗汁服一中河豚魚毒用橄欖汁蘆根汁糞清飲之俱可解一中蟹毒用紫蘇煮汁解之或藕汁蒜汁亦妙一食毒鱉飲藍汁數碗或靛青水亦妙一誤食螞蝗子肚疼黃瘦減食用田中泥一兩加雄黃二錢為丸分作四服白滾湯送下其蟲入泥隨大便出即愈或急取地漿飲之亦妙一吞螻蟻成漏不合用穿山甲炙研敷有婦人項上忽腫一塊漸至乳上偶用刀破腫處出清水一碗日久瘡不合此蟻漏也如法敷愈一中老汁物毒必生癰疽發背常飲松蘿茶即解
