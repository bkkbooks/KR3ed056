下新太和丸四十五枳殼焦楂肉麥芽赤茯苓蘇梗各二兩桔梗三兩甘草八錢當歸赤芍各一兩五錢丹皮廣皮砂仁各一兩各取淨末蜜水疊丸如彈子大每重一錢五分一治偶感氣滯薑湯下一治頭痛身重傷於風者加蔥白湯下一治冒暑者新荷葉煎湯下一治頭痛惡寒肌熱無汗蔥白湯下一治風寒客感愈後脾胃氣滯等症薑湯下一方治傷寒結胸陳酒糟六兩生薑水菖蒲根各四兩鹽二兩共搗炒熱為餅敷胸前痛處以熨斗熨之內響即去如口渴任吃茶水待大便下惡物愈通脈化痰飲四十六治中風暑毒並一切惡毒乾霍亂卒暴之症童便為君生薑汁為佐二味和勻溫服立解每童便一小盞入薑汁一匙蓋童便降火薑汁開痰下氣也正柴胡飲四十七凡外感風寒發熱惡寒頭疼身痛痎瘧初起等症血氣和平宜從平散者此方主之柴胡陳皮各一錢防風八分甘草四分赤芍一錢五分生薑渣七分白水煎熱服頭痛者加川芎一錢熱而兼渴者加葛根一錢嘔惡者加製半夏一錢五分濕勝者加蒼朮一錢胸腹有微滯者加厚朴七分寒氣勝而邪不易解者加麻黃五分去浮沫服之或加蘇葉七分柴陳煎四十八治傷風兼寒咳嗽發熱痞滿多痰等症柴胡八分製半夏一錢五分陳皮茯苓各一錢甘草四分生薑一片白水煎食遠溫服寒勝者加細辛五分風勝氣滯者加蘇葉一錢冬月寒勝者加麻黃五分氣逆多咳者加杏仁一錢痞滿氣滯者加白芥子五分歸葛飲四十九治陽明溫暑時症大熱大渴津液枯涸陰虛不能作汗等症當歸五錢乾葛一錢五分白水煎用冷水浸涼徐服之得汗即解歸柴飲五十治營虛不能作汗及真陰不足外感寒邪等症當歸五錢柴胡西黨參各一錢五分炙甘草五分陳皮一錢引加生薑一錢大便多溏者去當歸以炒白朮三錢代之清脾飲五十一治癉瘧脈來弦數單熱不寒或熱多寒少口苦咽乾小便赤澀製厚朴青皮各八分製半夏一錢炒白朮各一錢五分草果仁四分柴胡六分茯苓一錢二分甘草黃芩連皮姜各一錢棗一枚上藥瘧未發先時煎服忌生冷油膩並通治瘧症寒多者加肉桂五分熱多者加川連四分驅瘧飲五十二治瘧疾初起寒熱骨痛肢冷氣逆柴胡秦艽各六分炒蒼朮川貝藿香葉各一錢羌活桂枝各五分夏曲茯苓神麯各一錢五分廣木香四分煨青皮八分引蔥一根姜一片照服二劑得有透汗去羌活桂枝引去蔥方內蒼朮加五分外加生首烏二錢制首烏二錢當歸一錢五分赤芍二錢再二劑輕者可止如未止接服後方何人飲五十三截瘧如神凡氣血俱虛久瘧不止立效何首烏黨參各四錢當歸一錢五分陳皮一錢煨姜八分白水煎先時溫服之善飲者以酒一杯浸一宿次早加水一鍾煎服尤妙再煎不必用酒休瘧飲五十四此止瘧最妙之劑若汗散既多元氣不復或以衰老或以弱質瘧不能止俱宜用此化暴善後之第一方也其他症加減俱宜如法黨參四錢炒白朮三錢當歸二錢炙甘草八分制首烏五錢白水煎食遠服留渣再煎露一宿次早溫服一茶盞飯後食遠再服一盞如陽虛多寒宜溫中散寒者加乾薑五分甚者或加上肉桂熟附子各三分如陰虛多熱煩渴喜冷宜滋陰清火者加麥冬二錢五分炙生地三錢白芍二錢甚者加知母黃芩各一錢五分如腎陰不足水不制火虛煩虛餓腰痠腳軟或脾虛痞悶者加熟地四錢枸杞一錢五分山藥二錢杜仲一錢五分如邪未淨而留連難愈者加柴胡八分紫蘇葉一錢如氣血多滯者或用酒水各半煎服或服藥後飲酒數杯亦可消瘧飲五十五治三日久瘧鮮首烏五錢打碎白甘葛二錢甘草細茶各一錢陰陽水慢火煎一復時露一宿清晨服固元利關煎五十六治陰陽久瘧香附三錢紅花四分制首烏五錢炙黃耆一錢五分白水煎露一宿清晨熱服調氣平胃散五十七治胃氣不和脹滿腹痛陳皮七分煨木香二分烏藥甘草各三分砂仁四分白豆蔻白檀香製厚朴藿梗各五分蒼朮一錢引姜渣六分水一鍾半煎成食遠服香砂枳朮丸五十八治一切食積胸悶氣逆香附子苡仁各四兩茅山蒼朮赤茯苓蛀神麯各二兩麥芽一兩五錢砂仁廣木香枳殼各一兩甘草八錢上藥各取淨末水泛丸每服二錢淡薑湯下香連丸五十九治痢疾不拘紅白腹痛俱可服川連四兩吳萸三兩廣木香二兩各取淨末神麯打糊為丸每服一錢二分姜皮湯下一方用木香四兩苦參酒炒六兩共為末甘草一斤熬膏糊丸如桐子大每服三錢白痢薑湯下紅痢炙黑甘草五分煎湯下噤口痢砂仁四分蓮肉去心一錢煎湯下水瀉豬苓澤瀉各三分煎湯下玉壺丸六十治下痢危症白芍當歸各五錢赤苓三錢枳殼五分檳榔甘草車前子各二錢蘿蔔子一錢各取末蜜水疊丸如桐子大每服二錢紅痢黃連二分湯下白痢木香三分湯下久痢氣虛神弱者生熟黃耆各五分湯下極重痢症三服取效豁脾煎六十一治痢疾蒼朮一錢二分藿梗當歸各一錢厚朴五分炒神麯楂肉各二錢廣皮七分茯苓赤芍各一錢五分炙甘草四分廣木香四分磨汁沖服引加煨黑姜一片粟殼四分如腹痛臍下急痛按之愈痛此實痢熱痢也方內加生大黃一錢五分可投二劑取通利而愈如痛不拒按喜得熱物渴惡冷飲此冷痢也方內加附子四分制熟用滑石一錢五分車前子八分取和解而愈愈後服香砂六君子湯三五劑加慎調理一味金花煎六十二治熱毒血痢金銀花藤四錢白水濃煎溫服保和益元散六十三治噤口痢糯稻一升炒出白花去殼再加薑汁拌濕再炒為末每服一錢五分白湯調下取填飲六十四治血痢如注並初起作痢腹痛下如土朱豬肝色者夏枯草五錢紅花二分白水煎濃湯入真砂糖一錢調和空心服三服愈一方治泄瀉垂危用豇豆葉陰乾為末令患者少停飲食口覺發干濃煎一大壺如茶飲之雖危急可愈一方治赤白久痢用雞子以醋煮一晝夜空腹食之兼治小兒疳症一方治赤白痢用乾薑於火內燒焦黑不可成炭放瓷瓶內閉冷為末青蒿葉陰乾為末二味和勻每服一錢米飲調下附方治瀉痢脫肛用蝸牛燒灰豬脂和敷立縮又方蟬殼為末菜油調敷加內服補中湯方見前十九味羌活湯六十五治四時不正之氣感冒風寒憎寒壯熱頭疼身痛口渴咽乾等症羌活防風各六分蒼朮一錢白芷四分川芎五分生地一錢五分黃芩七分甘草五分北細辛二分引加姜一片棗一枚煎成熱服取汗有汗者去蒼朮加白朮一錢五分渴甚者加葛根一錢石膏一錢五分化毒丸六十六治天行瘟疫及喉痹頸面暴腫諸症直殭蠶一兩炒為末川大黃二兩酒拌曬為末生薑汁和蜜水為丸彈子大每服一粒每粒重一錢五分真菊花葉五錢搗汁沖湯調服回春散六十七治陰症取汗即愈白礬一錢黃丹八分胡椒二分芒硝一分用陳釅醋和糊攤在手心男左女右側身蜷腿手合陰處出汗即解勿吃冷水如不愈用雙料則效純陽救苦湯六十八治男婦陰症神效生薑一兩切片大黑豆五錢炒熟水煮數沸濾去姜豆取汁服之汗出即愈理中湯六十九治太陰病自利不渴陰寒腹痛短氣咳嗽霍亂嘔吐飲食難化胸膈噎塞或瘧疾瘴氣瘟疫中氣虛損久不能愈或中虛生痰等症黨參五錢桂圓七枚煎汁煮乾白朮三錢炒乾薑八分炒炙甘草一錢白水煎溫服如前症輕者分兩可酌減半風火雙解散七十治頭風兩太陽疼川芎白芷熟石膏各等分為末每服三錢熱茶調下食遠服探吐飲七十一治乾霍亂手足溫者入口即吐氣絕復通炒鹽一撮和童便溫服開鬱散七十二治驚痰瘀血流滯心竅及憂鬱氣結致成失心癲癇諸症真鬱金三錢生明礬一錢五分為末青竹葉湯調服蓋鬱金入心去血明礬能化頑痰也開元固氣丸七十三治各種疝氣西黨參上綿耆炙焦白朮川楝肉鹽酒炒蛀青皮當歸身各四兩酒炒小茴香鹽水炒上官桂赤芍白芍各三兩軟柴胡醋炒肥升麻各一兩五錢大熟地五兩炙甘草新會皮青木香橘核各二兩各取末煉蜜為丸淡酒下每服四錢一方疝初起寒熱疼痛如欲成囊癰者用新鮮地骨皮即枸杞子根生薑各四兩共搗如泥以絹包於囊上其癢異常一夕即消永不再發闢寒煎七十四治寒疝攻心急痛木香一錢青皮香附蒼朮黑醜取頭末元胡索各二錢大茴香七分良薑六分肉桂五分五靈脂一錢五分吳茱萸八分陳酒二杯煎至一杯空心溫服立止一方用川楝子取肉炒為末每服三錢空心陳酒調服遊山散七十五治心脾痛草果元胡索五靈脂沒藥上各等分為末每服三錢溫酒調下一方治卒然心痛牙關緊閉欲絕用老蔥白五根搗汁送入咽中再灌麻油四兩但得下咽即蘇如系蟲痛上齶白點為驗照用掃蟲煎方見後八十化蟲散方見後八十一等方自愈和胃飲七十六治胃氣痛淡吳萸四分川連乾薑各二分橘皮當歸白芍各一錢桂枝同白芍炒炙草各五分西黨參一錢五分炙生香附七分去毛白水煎服凡胃痛虛寒者多實熱者少虛寒者口多清涎得熱飲痛可稍緩實熱者或口渴咽乾或多痰喘急虛寒者肢冷麵白實熱者肢雖冷面必赤此可辨也實熱者易解梔子清肝散方見後七十七主之或加味逍遙散方見前二十六一帖可愈虛寒者難治暫愈復發以是方與補中湯方見前十間進之加服六味桂附丸方見前八斯可漸愈其有寒而實者肢冷麵白氣促勺飲下咽即吐方內去黨參加法制半夏三錢溫飲而病自解梔子清肝散七十七治胃痛由於實熱者柴胡六分山梔子炒黑黃芩炒廣皮各七分甘草三分白芍一錢醋炒引薑汁一大匙沖服清金下痰丸七十八治風疾癇疾白礬一兩陳松蘿茶五錢為末蜜丸如桐子大一歲十丸大人五十丸茶湯下久服痰自大便出即愈豨桐丸七十九治男女感受風濕或嗜飲冒風內濕外邪傳於四肢脈胳壅塞不舒以致兩足軟痠疼痛不能步履或兩手牽絆不能仰舉凡辛勞之人常患此症狀似風癱服此丸立能全愈或單用臭梧桐二錢煎湯飲以酒過之連服十劑其痛即瘥或煎湯洗手足亦可豨薟草八兩炒磨末地梧桐俗名臭梧桐不論花葉梗子俱可用取切碎曬乾炒磨末一斤上二味和勻煉蜜丸梧桐子大開水下四錢忌食豬肝羊血番菇等物掃蟲煎八十治諸蟲上攻胸腹作痛凡驗蟲症視其目無精光面色灰白肌膚消瘦頰時火暈胸脅作痛肚腹攪脹飲食易餓餓時痛甚得食稍止唇焦舌燥上齶有白點者真蟲症也照方投二三劑取吐下而愈吳茱萸青皮小茴香各一錢炒檳榔烏藥各一錢五分細榧肉三錢敲碎烏梅一個甘草八分硃砂雄黃各五分為極細末上將前八味用白水煎去渣隨入後二味再煎三四沸攪勻徐徐服之如噁心作吐加炒乾姜八分或先啖肉脯少許俟一茶頃服之化蟲散八十一治症同前雷丸八分檳榔鶴蝨各一錢使君子一錢五分輕粉四分上為末分二服晚刻以精豬肉一兩切片用皂角泡湯浸一宿至五更慢火炙透蘸香油取前藥末一服糝肉上略烘過食之至已飯時蟲下後乃進飲食消痞簡易方八十二專治痞疾荸薺一百個花頭海蜇三斤各洗淨入沙鍋內同水煮一日冬天一夜單食荸薺自消厭紅溫胃飲八十三治一切血症凡傷酒食飽低頭掬損吐血不止甚至妄行口鼻俱出但聲未失者悉效並治鼻血舌上及齒縫出血用吹糝即止百草霜二錢研細糯米湯調下清涼散八十四治舌上出血蒲黃灰槐花末各等分研細干糝舌上加用鮮生地五錢搗汁白湯沖服惜紅飲八十五治鼻血不止陳京墨酒磨汁外用五味子四分麥冬一錢煎湯和服可止一方用新白芨一薄片貼眉心即止重者換貼一次一方用血餘燒灰存性為末吹入立止小便秘八十六是症多由感冒傷寒瘧痢變症其冷熱可以蔥熨法試之冷秘蔥熨即通熱秘旋通旋秘柴胡六分木通五分茯苓一錢甘草四分冷秘加熟附子三分熱秘加黃芩知母車前各五分急流水煎服一方治冷秘蔥白切炒熱包帛內慢揉臍下即通一方治熱秘萵苣菜搗爛貼臍上立通清溲飲八十七治小便血荷葉蒂七枚燒灰酒調服
