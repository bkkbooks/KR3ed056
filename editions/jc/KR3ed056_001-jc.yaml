body:
  text: 卷一內症門方首內症內有自內出者七情之所傷有由外感者六氣之所客而不但已也凡飲食勞郁皆觸於外而中於內凡風痹淫濕皆積於內而達於外矧元氣日益薄真精日易耗其稟賦厚者十無一二其體質虧者十得八九雖有膏粱藜藿之別而其中堅強者大都不可多得體此以制方補益與和解並重調理次重攻下者間存一二因人症而施之可應手而效勿以平易簡便忽忽看過以為無奇方必無奇效則不明岐軒救世之苦心矣輯內症大造丸一治腎虛腰疼羸瘦恇怯諸症白朮苡仁沙苑子各二兩各取淨末用杜仲四兩熬膏為丸每服四錢酒下坎離既濟丹二治心腎不交徹夜無寐骨蒸汗泄陰陽兩虧諸症川連二兩肉桂一兩炙甘草五錢各取淨末蜜丸每晚服三錢酒下滋元飲三治一切風痹攣痿腰膝酸楚筋脈不通周身疼痛並遺精白濁諸症熟地八兩麥冬四兩萸肉八錢龍骨一兩元參南沙參各三兩牛膝虎骨各二兩桑枝桂枝木五味子各五錢各取末用南棗六兩去皮核煮爛同熟地杵膏為丸每服三錢酒下五益膏四治諸虛百損玉竹黃耆蜜炙白朮土炒各一斤熟地酒洗枸杞子酒洗各八兩上方文火煎熬成膏每早晚二錢用酒一杯或開水一杯調下回元飲五治經年頭疼終朝眩暈諸虛百損火嗽潮熱等症熟地十兩萸肉四兩北五味麥冬甘菊各二兩川芎元參山藥當歸各三兩玉竹八兩鴟梟腦一個酒蒸炙研各取末蜜丸每服三錢鹽湯下益元煎六治男婦小兒一切食積腹脹氣弱血衰諸症白朮一斤建曲六兩扁豆廣皮麥芽茯苓各八兩小蟬肝四兩即水雞肝蜜丸每服一錢五分米飲調下贊化血餘丹七此藥大補氣血烏鬚髮壯形體有培元贊化之功血餘炙熟地各八兩蒸搗枸杞當歸鹿角膠炒成珠菟絲子制杜仲鹽水炒小茴香略炒巴戟肉酒浸剝炒乾白茯苓乳拌蒸肉蓯蓉酒洗去鱗甲胡桃仁各四兩黨參六兩何首烏四兩小黑豆汁拌蒸七次如無黑豆或人乳牛乳亦可上煉蜜丸每服二錢開水送下精滑加白朮山藥各三兩便溏去蓯蓉加補骨脂酒炒四兩陽虛痿弱加製附子五錢上肉桂一兩六味地黃丸八治腎水虧損小便淋閉頭目眩暈腰腿痠軟陰虛發熱自汗盜汗憔悴瘦弱失血失音水泛為痰病為腫脹壯水治火之劑也熟地八兩蒸搗山茱萸山藥各四兩丹皮白茯苓澤瀉各三兩上為細末和地黃膏加煉蜜為丸如桐子大每服四錢空心食前開水淡鹽湯任下如腎臟積熱症現耳鳴目眩煩渴火嗽照方加知母黃柏各一兩如腰膝陰疼寒積下焦精冷腹痛等症是火不足也照方加上桂熟附子各一兩玉液散九治大便下血柞樹皮白芍當歸各二錢地榆丹參各一錢五分熟地五錢葛根八分甘草一錢黃連一錢五分用吳萸四分同炒去吳萸共為末和勻每服五錢烏梅湯調下一方槐花炒黑扁柏葉炒黑陳棕灰各等分共為末每服一錢鮮生地五錢搗汁沖湯和服補中益氣湯十治勞倦傷脾中氣不足清陽不升外感不解體倦食少寒熱瘧痢氣虛不攝血等症當歸一錢甘草炙陳皮各五分升麻柴胡各四分黨參蜜水炙黃耆蜜水炙各三錢白朮一錢五分炒引加姜一片棗三枚調理益氣湯十一治濕熱所傷體重煩悶口失滋味或痰嗽稠黏寒熱不調體倦少食脾虛泄瀉等症兼治虛人瘧痢黃耆蜜水炙黨參各一錢五分焙蒼朮一錢炒橘紅五分木香煨柴胡升麻各四分白蔻肉炙甘草各三分引加姜皮一分小紅棗三枚空心服歸脾湯十二治思慮傷脾不能攝血致血妄行或健忘怔忡驚悸盜汗嗜臥少食或大便溏泄心脾疼痛瘧痢鬱結或因病用藥失宜克伐傷脾以致變症者俱宜服之黨參焙黃耆蜜炙炒白朮各一錢五分當歸茯苓各一錢炒棗仁一錢二分遠志八分木香四分煨炙甘草五分引加圓眼肉七枚煎成食遠服如無痛郁等症去木香如燥熱多汗並去遠志加柴胡八分炒山梔一錢八珍湯十三治氣血兩虛肌熱火嗽皮寒骨痛病後失調飲食不香兼治婦人經水不調赤白帶等症黨參蜜水炙熟地各三錢當歸白朮各一錢五分炙甘草五分川芎八分白芍一錢茯苓一錢五分引加姜一片棗二枚或粳米百粒白水煎服當歸補血湯十四治血氣損傷或因攻伐致虛肌熱口渴目赤面紅脈大而虛重按全無及病因飢飽勞役者炙黃耆一兩當歸三錢白水煎食遠服黃耆六一湯十五治陰陽俱虛盜汗等症炙黃耆六錢炙甘草一錢白水煎食遠服斂氣歸源飲十六治盜汗不止黃耆蜜炙黑豆浮麥各等分煎服五福飲十七治五臟氣血虧損日晡潮熱陰虛盜汗脾胃不香瘧痢反復經久不愈怔忡心悸遺精滑脫等症黨參蜜炙五錢熟地三錢當歸炒白朮各一錢五分炙甘草一錢引加生薑一片水煎食遠溫服六味回陽飲十八治陰陽離脫或中風不語或胃口冷痛肢寒汗溢諸凡危症黨參桂圓肉拌煮大熟地各一兩製附子炮姜各一錢炙甘草八分當歸身四錢如泄瀉或血動者以白朮代之白水用武火煎溫服如肉振汗多者加炙黃耆五錢或一兩泄瀉加烏梅二個或北五味二十粒虛陽上浮者加赤茯苓一錢肝經鬱滯者加上桂一錢六味異功煎十九治脾胃虛寒嘔吐泄瀉痹濕等症白朮三錢茯苓一錢五分炙甘草八分乾薑四分炒陳皮一錢黨參桂圓肉汁制四錢白水煎服壽脾煎二十治脾虛不能攝血等症凡憂思鬱怒積勞及誤用攻散之藥犯損脾陰以致中氣虧陷神魂不寧大便脫血不止或婦人無火崩淋等症凡兼嘔惡尤為危候速宜用此單救脾氣則統攝固而血自歸源此歸脾湯之變方其效如神若犯此症再用寒涼胃氣必脫無不即死者白朮三錢遠志五分制乾薑炒黑炙甘草各一錢當歸山藥各二錢棗仁一錢五分炒研蓮肉二十粒去心炒黨參一兩桂圓汁制白水煎服一二劑下血未止加地榆一錢五分大便滑脫不禁者加醋炒文蛤一錢小便遺濁虛滑者加鹿角霜二錢為末攪入藥中服之氣虛甚者加炙黃耆四錢氣陷而墜者加炒升麻五分兼溏泄者加補骨脂一錢炒用陽虛畏寒者加製附子一錢血去過多陰陽氣餒心跳不寧加熟地八錢或一兩金水六君煎二十一治肺腎虛寒水泛為痰或年邁陰虛氣血不足外受風寒咳嗽嘔惡多痰喘急等症茯苓當歸各二錢熟地三錢陳皮八分製半夏一錢五分炙甘草五分引加生薑一大片食遠溫服如大便不實去當歸加山藥二錢如痰盛氣滯胸膈不快加白芥子七分如陰寒盛嗽不愈加北細辛五分如兼表邪寒熱加柴胡一錢香砂六君子湯二十二治中氣虛滯噁心脹滿或過服涼藥以致食少作嘔等症黨參三錢炙茯苓一錢白朮炒製半夏各一錢五分陳皮八分砂仁六分藿香五分炙甘草三分引加生薑一片水煎服歸芍二陳湯二十三治痰飲嘔惡風寒咳嗽或頭眩心悸或中脘不快或吃生冷飲酒過多脾胃不和等症當歸白芍炒廣皮茯苓各一錢炙甘草五分法制半夏三錢引加生薑一片棗二枚食遠服和兌飲二十四治新久咳嗽未經見血者三五服可漸愈生薑汁一小匙白蜜二匙二味和勻重湯頓服綠豆飲二十五治諸火症熱毒煩渴喘嗽諸症用綠豆不拘多寡寬湯煮糜爛入鹽少許或蜜亦可任意飲食之日三四次此物性非苦寒不傷脾胃且善於解毒除煩退熱止渴大利小水乃淺易之最佳最捷者也逍遙散二十六治肝脾血虛及鬱怒傷肝少血目暗發熱脅痛等症當歸一錢五分白芍一錢白朮茯神各一錢二分甘草四分柴胡六分引加生薑一片水煎服照方加丹皮炒山梔仁各七分白水煎或加姜皮半分名加味逍遙散治肝脾血虛發熱小水不利兼胃痛由於實熱者徙薪飲二十七治三焦浮火肌里伏熱時或嗆嗽痰涎滿口或舌破牙齦腫痛等症陳皮丹皮各八分黃芩炒黃柏各一錢赤芍麥冬去心赤茯苓各一錢五分甘草五分白水煎食遠溫服如多郁氣逆傷肝脅痛甚致下血者加青皮炒梔各四分益氣培元飲二十八治遺精白濁溺下砂淋莖中癢痛腰膝痠痛諸症是症由於精滿自溢濕熱積於膀胱者十不一二由於氣虛思慮過勞役傷或強任房事或病後失調攻伐之過致損臟氣而成斯症者十居八九此古今元氣不同之一以是方與補中湯方見前十相間投之可以漸愈接服六味地黃湯方見前八加慎調攝自無反復切勿誤投通利之藥如大黃通草之類致益虧損慎之切慎之大熟地制杜仲各三錢丹皮八分茯苓一錢二分淮山藥二錢建澤瀉五分柴胡六分當歸山萸肉枸杞子炒白芍各一錢五分甘草梢一錢引加姜皮半分南棗三枚偏痹症治法二十九凡偏痹症初起卒然痰壅昏迷撒手遺便遺溺牙關緊閉用豬牙皂研細末吹鼻內取嚏用白礬青鹽各等分擦牙涎出即開隨用二陳湯見前二三加上蟾酥五分真西黃珍珠各五釐血珀三分研末衝入灌之俟痰涎或吐或下人事漸醒再服活絡飲並用蒸熨法附活絡飲三十淮牛膝明天麻各一錢防風八分紅花四分生赤首烏制赤首烏生黃耆熟黃耆制杜仲丹參各一錢五分獨支當歸四錢法制半夏三錢桂枝五分引加虎膠八分淡酒一杯頓化和服上方日服一劑計服五劑每日照後方蒸熨法日三次蒸熨五日手足漸可屈伸半身稍和稍知痛癢方內更加大熟地四錢川芎八分真橘紅一錢再投五劑前後藥渣存留晾乾加虎脛骨四錢浸真麥酒三斤隨量溫飲可以漸愈附蒸熨方三十一真淨檀香一兩銼碎煎湯隔布單以半身置布單上熏蒸加全當歸六兩丹參牛膝桂枝各二兩紅花五錢蔥六兩切碎酒浸一宿炒過先制紅興布袋數個將藥分貯袋內亦蒸香水上隨蒸隨用藥袋慢揉日三次祛風散三十二治歷節風痛晝夜不止半身不遂等症虎脛骨一兩炙酥為末沒藥五錢為末二味和勻每服一錢溫酒調服附藥酒方三十三黑料豆一升形小如腰子樣者佳油松節四兩銼碎白蜜一斤取好陳麥燒酒十五斤重湯煮一炷香出火氣早晚隨量溫飲滋源飲三十四治飲食下咽即消心煩咽渴面赤舌燥徹夜無寐小便赤澀大便燥結等症鮮生地一兩搗汁洋參二錢蜜炙甘草五分微炙棗仁炒茯神麥冬各二錢去心硃砂一分染用洋參等五味白水煎成沖生地汁服日二劑旬日取效接服六味丸方見前八可愈戊己丸三十五治反胃膈噎熟地八兩杵膏萸肉三兩當歸麥冬去心苡仁牛膝各二兩白芥子元參各一兩丹參一兩五錢北五味五錢各取淨末用生薑六兩取汁和煉蜜同熟地杵膏為丸每服二錢漸加至三四錢老米三錢煎湯調下一方用貓胎胞新瓦炭火炙乾研細末每服三分好酒送下粒米不下者五六次愈酒內不可有燒酒氣一方用陳倉米一斗同山黃土炒令米熟去土為末以粟米煎湯調下再用白水牛喉管一條去兩頭節並筋膜脂肉節節取下以米醋一碗浸之頻翻動令勻微火炙乾醋淬再炙再淬醋乾為度勿見日色只宜火焙研細末厚紙包好收或遇陰濕時連紙微火烘焙收藏每服一錢食前陳米飲下輕者一二服取效一方治翻胃吐食用韭汁二杯薑汁一杯牛乳一杯三味調和溫服日服一二次三五日取效蓋韭汁清血薑汁下氣消痰和胃牛乳能解熱下氣補虛也生冷果食麵食均忌扶中丸三十六治經年膨脹茯苓六兩洋參大麥芒各四兩苡仁三兩製附子一兩蘿蔔子大黃各八錢甘草三錢白朮雷丸肉桂各五錢各取淨末和勻每服五錢姜一片同煎服一方用鯉魚重斤許者一尾去腸雜清水洗淨拭乾將小紅豆填滿魚腹不著鹽醬煮熟連湯食之三四次即愈一方治腹脹水腫用亞腰葫蘆一個蓮子燒灰存性為末每服一錢食前溫酒下不飲酒者白湯下一方治通身腫脹用葶藶子四兩炒為末棗肉為丸如桐子大桑皮湯下十五丸日三次一方用黃牛